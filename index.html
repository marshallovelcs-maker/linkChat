<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LinkChat — Черно-белый чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .chat-container {
            max-width: 1000px;
            width: 100%;
            height: 90vh;
            min-height: 550px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            background: #000000;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .badge {
            background: #2a2a2a;
            padding: 0.25rem 0.8rem;
            font-size: 0.7rem;
            color: #aaaaaa;
            font-family: monospace;
            border: 1px solid #3a3a3a;
        }

        .online-badge {
            background: #1a3a1a;
            color: #90ee90;
            padding: 0.25rem 0.8rem;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #2a5a2a;
        }

        .copy-link-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            font-size: 0.85rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-link-btn:hover {
            background: #3a3a3a;
            border-color: #5a5a5a;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
            background: #0f0f0f;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message.own {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-bubble {
            background: #1e1e1e;
            padding: 0.8rem 1.2rem;
            color: #e0e0e0;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.45;
            border: 1px solid #2a2a2a;
        }

        .message.own .message-bubble {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ffffff;
        }

        .message-sender {
            font-size: 0.7rem;
            color: #888888;
            margin-top: 0.3rem;
            padding: 0 0.2rem;
        }

        .message.own .message-sender {
            text-align: right;
        }

        .sender-name {
            font-weight: 600;
            color: #aaaaaa;
        }

        .message.own .sender-name {
            color: #cccccc;
        }

        .message-time {
            color: #666666;
            margin-left: 0.5rem;
        }

        .system-message {
            text-align: center;
            font-size: 0.75rem;
            color: #888888;
            background: #111111;
            margin: 0.3rem auto;
            padding: 0.4rem 1rem;
            width: fit-content;
            max-width: 90%;
            border: 1px solid #222222;
        }

        .input-area {
            background: #0a0a0a;
            padding: 1rem 1.5rem 1.2rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .name-input-wrapper {
            display: flex;
            background: #111111;
            padding: 0.1rem 0.1rem 0.1rem 1rem;
            align-items: center;
            gap: 0.3rem;
            flex: 1 1 150px;
            border: 1px solid #2a2a2a;
        }

        .name-input-wrapper span {
            color: #666666;
            font-size: 0.9rem;
        }

        #usernameInput {
            background: transparent;
            border: none;
            padding: 0.7rem 0.2rem 0.7rem 0;
            color: #e0e0e0;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            font-weight: 400;
        }

        .message-input-wrapper {
            flex: 4;
            display: flex;
            background: #111111;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem 0.5rem;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        button:hover {
            background: #2a2a2a;
            border-color: #5a5a5a;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2a2a;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.2s;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 95vh;
            }
            .message {
                max-width: 95%;
            }
            .input-area {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
            }
            .name-input-wrapper, .message-input-wrapper {
                width: 100%;
            }
            button {
                justify-content: center;
            }
            .toast-msg {
                white-space: normal;
                max-width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="brand">
            <h1>◼ LinkChat</h1>
            <div class="badge">black & white</div>
            <div class="online-badge" id="onlineStatus">
                <span>●</span> <span id="onlineCount">0</span>
            </div>
        </div>
        <button class="copy-link-btn" id="copyLinkButton">
            ⎘ Поделиться
        </button>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="system-message">◼ Подключение к чату...</div>
    </div>

    <div class="input-area">
        <div class="name-input-wrapper">
            <span>◼</span>
            <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="24" autocomplete="off">
        </div>
        <div class="message-input-wrapper">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." maxlength="500" autocomplete="off">
        </div>
        <button id="sendButton">◼ Отправить</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, remove } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "messages");
    
    const messagesArea = document.getElementById("messagesArea");
    const usernameInput = document.getElementById("usernameInput");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendButton");
    const copyLinkBtn = document.getElementById("copyLinkButton");
    const onlineCountSpan = document.getElementById("onlineCount");
    
    let userId = localStorage.getItem("linkchat_user_id");
    if (!userId) {
        userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
        localStorage.setItem("linkchat_user_id", userId);
    }
    
    let currentUsername = localStorage.getItem("linkchat_username") || "Гость_" + Math.floor(Math.random() * 1000);
    usernameInput.value = currentUsername;
    
    usernameInput.addEventListener("change", (e) => {
        let newName = e.target.value.trim();
        if (newName === "") newName = "Аноним";
        if (newName.length > 24) newName = newName.slice(0, 24);
        currentUsername = newName;
        localStorage.setItem("linkchat_username", currentUsername);
        
        const userStatusRef = ref(db, `users/${userId}`);
        set(userStatusRef, {
            username: currentUsername,
            lastSeen: Date.now()
        });
        
        addSystemMessage(`Вы сменили имя на ${currentUsername}`);
    });
    
    function addMessageToDOM(username, text, timestamp, isOwn = false) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        messageDiv.innerHTML = `
            <div class="message-bubble">${escapeHtml(text)}</div>
            <div class="message-sender">
                <span class="sender-name">${escapeHtml(username)}</span>
                <span class="message-time">${timeStr}</span>
            </div>
        `;
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function addSystemMessage(text) {
        const sysDiv = document.createElement("div");
        sysDiv.className = "system-message";
        sysDiv.innerHTML = `◼ ${escapeHtml(text)}`;
        messagesArea.appendChild(sysDiv);
        scrollToBottom();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 50);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        const username = currentUsername.trim() || "Аноним";
        
        push(messagesRef, {
            username: username,
            text: text,
            timestamp: Date.now(),
            userId: userId
        }).catch(error => {
            console.error("Ошибка:", error);
            addSystemMessage("Ошибка отправки сообщения");
        });
        
        messageInput.value = "";
        messageInput.focus();
    }
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
    
    copyLinkBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("◼ Ссылка скопирована");
    });
    
    function showToast(text) {
        let toast = document.querySelector(".toast-msg");
        if (toast) toast.remove();
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.innerText = text;
        document.body.appendChild(div);
        setTimeout(() => {
            div.style.opacity = "0";
            setTimeout(() => div.remove(), 300);
        }, 2000);
    }
    
    const recentQuery = query(messagesRef, limitToLast(100));
    
    let firstLoad = true;
    onChildAdded(recentQuery, (snapshot) => {
        const data = snapshot.val();
        const isOwn = (data.userId === userId);
        addMessageToDOM(data.username, data.text, data.timestamp, isOwn);
        
        if (firstLoad) {
            const loadingMsg = messagesArea.querySelector(".system-message");
            if (loadingMsg && loadingMsg.innerText.includes("Подключение")) {
                loadingMsg.remove();
            }
            firstLoad = false;
        }
    });
    
    const userStatusRef = ref(db, `users/${userId}`);
    set(userStatusRef, { username: currentUsername, lastSeen: Date.now() });
    
    onValue(ref(db, "users"), (snapshot) => {
        const users = snapshot.val();
        if (users) {
            const now = Date.now();
            let onlineCount = 0;
            for (let id in users) {
                if (now - (users[id].lastSeen || 0) < 60000) {
                    onlineCount++;
                } else {
                    remove(ref(db, `users/${id}`));
                }
            }
            onlineCountSpan.textContent = onlineCount;
        } else {
            onlineCountSpan.textContent = "0";
        }
    });
    
    setInterval(() => {
        set(userStatusRef, { username: currentUsername, lastSeen: Date.now() });
    }, 30000);
    
    window.addEventListener("beforeunload", () => {
        remove(userStatusRef);
    });
    
    addSystemMessage(`Добро пожаловать, ${currentUsername}`);
</script>
</body>
</html>
