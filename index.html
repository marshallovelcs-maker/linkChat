<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fembo — Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 1200px;
            width: 100%;
            height: 90vh;
            background: #0a0a0a;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #000;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .sidebar-header h3 { color: #fff; font-size: 0.9rem; }
        .search-box {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.6rem;
            color: #e0e0e0;
            margin-top: 0.5rem;
            outline: none;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem;
            margin: 0.2rem 0;
            background: #111;
            border: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .user-item:hover { background: #1a1a1a; }
        .user-name { color: #e0e0e0; font-size: 0.85rem; }
        .user-id { color: #666; font-size: 0.7rem; font-family: monospace; margin-left: 0.5rem; }
        .user-status { width: 8px; height: 8px; border-radius: 50%; }
        .status-online { background: #2ecc71; }
        .status-offline { background: #7f8c8d; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            background: #000;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 24px; }
        h1 { font-size: 1.2rem; color: #fff; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #3a3a3a;
        }
        .user-info span:first-child { color: #888; font-size: 0.7rem; }
        .user-info .nickname { color: #ffaa66; font-weight: 600; font-size: 0.8rem; }
        .user-info .user-id-display { color: #666; font-size: 0.7rem; font-family: monospace; }
        .edit-name-btn {
            background: #2a2a2a;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }
        .logout-btn {
            background: #2a2a2a;
            border: 1px solid #5a3a3a;
            color: #ff8888;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        .copy-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 0.5rem;
            gap: 0.3rem;
            overflow-x: auto;
            min-height: 45px;
        }
        .tab {
            padding: 0.5rem 1rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            position: relative;
            transition: all 0.2s;
        }
        .tab.active { background: #1a1a1a; color: #fff; border-color: #4a4a4a; margin-bottom: -1px; }
        .tab.has-unread { background: #2a5a2a; color: #fff; border-color: #4a8c4a; }
        .tab.blinking { animation: blink 0.8s ease-in-out infinite; }
        @keyframes blink { 0%,100% { background: #2a5a2a; } 50% { background: #ffaa33; color: #000; } }
        .close-tab { margin-left: 6px; color: #888; cursor: pointer; font-size: 0.7rem; }
        .close-tab:hover { color: #ff8888; }
        .unread-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            font-weight: bold;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            background: #0f0f0f;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }
        .message.own { align-self: flex-end; }
        .message.unread {
            animation: highlight 0.5s ease-out;
            border-left: 3px solid #ffaa33;
            padding-left: 8px;
        }
        @keyframes highlight {
            0% { background: rgba(255, 170, 51, 0.3); }
            100% { background: transparent; }
        }
        .bubble {
            background: #1e1e1e;
            padding: 0.6rem 1rem;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }
        .message.own .bubble { background: #2a2a2a; }
        .sender {
            font-size: 0.65rem;
            color: #888;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .message.own .sender { justify-content: flex-end; }
        .sender-name { font-weight: 600; color: #aaa; }
        .sender-id { color: #666; font-family: monospace; }
        .message-time { color: #666; }
        .system {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            background: #111;
            padding: 0.3rem;
            margin: 0.2rem auto;
            width: fit-content;
            border: 1px solid #222;
            border-radius: 4px;
        }
        .input-area {
            background: #0a0a0a;
            padding: 0.8rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.5rem;
        }
        .input-wrapper {
            flex: 1;
            background: #111;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }
        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 0.6rem 0.3rem;
            color: #e0e0e0;
            outline: none;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.5rem 1rem;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 6px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a2a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            z-index: 1000;
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-modal {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }
        .auth-modal h2 { color: #fff; margin-bottom: 1.5rem; font-size: 1.2rem; }
        .auth-input {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .auth-switch { text-align: center; color: #888; font-size: 0.85rem; cursor: pointer; }
        .auth-switch span { color: #ffaa66; text-decoration: underline; }
        .auth-error { color: #ff8888; font-size: 0.8rem; text-align: center; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="chat-container" id="chatContainer" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>◼ Пользователи</h3>
            <input type="text" id="searchUsers" class="search-box" placeholder="Поиск...">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    <div class="main-area">
        <div class="chat-header">
            <div class="brand"><div class="logo">🦊</div><h1>Fembo</h1></div>
            <div class="user-info">
                <span>👤</span>
                <span class="nickname" id="userNickname"></span>
                <span class="user-id-display" id="userIdDisplay"></span>
                <button class="edit-name-btn" id="editNameBtn">✎</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                <button class="copy-btn" id="copyBtn">⎘</button>
            </div>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-wrapper"><input type="text" id="messageInput" placeholder="Напишите сообщение..."></div>
            <button id="sendBtn">◼ Отправить</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, off, get } from "firebase/database";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // DOM
    const chatContainer = document.getElementById("chatContainer");
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const copyBtn = document.getElementById("copyBtn");
    const usersListDiv = document.getElementById("usersList");
    const searchInput = document.getElementById("searchUsers");
    const tabsContainer = document.getElementById("tabsContainer");
    const userNicknameSpan = document.getElementById("userNickname");
    const userIdDisplaySpan = document.getElementById("userIdDisplay");
    const editNameBtn = document.getElementById("editNameBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    
    // Глобальные переменные
    let currentUser = null;
    let myUsername = "";
    let myUniqueId = "";
    let currentChat = { type: "global", id: null, name: "Общий чат" };
    let openTabs = [{ type: "global", id: null, name: "Общий чат" }];
    let activeTabIndex = 0;
    let allUsers = new Map();
    let globalMessages = [];
    let globalMessageIds = new Set();
    let privateMessages = new Map();
    let privateMessageIds = new Map();
    let lastReadTime = new Map();
    let globalListener = null;
    let privateListeners = new Map();
    let processedMsgIds = new Set();
    
    // Генерация ID
    function generateUniqueId() {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const randomLetter = letters[Math.floor(Math.random() * letters.length)];
        const randomNumbers = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        return `${randomNumbers}${randomLetter}`;
    }
    
    async function saveUserToDatabase(userId, email, username, uniqueId) {
        await set(ref(db, `users/${userId}`), {
            email: email,
            username: username,
            uniqueId: uniqueId,
            lastSeen: Date.now(),
            online: true
        });
    }
    
    async function loadUserData(userId) {
        const snapshot = await get(ref(db, `users/${userId}`));
        return snapshot.val();
    }
    
    async function getUniqueUserId() {
        let uniqueId;
        let isUnique = false;
        let attempts = 0;
        while (!isUnique && attempts < 50) {
            uniqueId = generateUniqueId();
            const idRef = ref(db, `unique_ids/${uniqueId}`);
            const snapshot = await get(idRef);
            if (!snapshot.exists()) {
                isUnique = true;
                await set(idRef, { taken: true, userId: auth.currentUser?.uid });
            }
            attempts++;
        }
        return uniqueId;
    }
    
    function showToast(msg) {
        let t = document.querySelector(".toast");
        if (t) t.remove();
        const d = document.createElement("div");
        d.className = "toast";
        d.innerHTML = `📩 ${escapeHtml(msg)}`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function addMessageToDOM(name, uniqueId, text, ts, isOwn, isUnread = false) {
        const div = document.createElement("div");
        div.className = `message ${isOwn ? 'own' : ''} ${isUnread ? 'unread' : ''}`;
        const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="sender">
                <span class="sender-name">${escapeHtml(name)}</span>
                <span class="sender-id">${escapeHtml(uniqueId)}</span>
                <span class="message-time">${time}</span>
            </div>
        `;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        if (isUnread) setTimeout(() => div.classList.remove('unread'), 2000);
    }
    
    function saveTabs() {
        const tabs = openTabs.filter(t => t.type === "private").map(t => ({ id: t.id, name: t.name }));
        localStorage.setItem("fembo_tabs", JSON.stringify(tabs));
    }
    
    function loadTabs() {
        try {
            const saved = localStorage.getItem("fembo_tabs");
            if (saved) {
                const tabs = JSON.parse(saved);
                openTabs = [{ type: "global", id: null, name: "Общий чат" }];
                tabs.forEach(t => openTabs.push({ type: "private", id: t.id, name: t.name }));
            }
        } catch(e) {}
    }
    
    function loadLastRead() {
        try {
            const saved = localStorage.getItem("fembo_lastread");
            if (saved) {
                const obj = JSON.parse(saved);
                lastReadTime.clear();
                Object.entries(obj).forEach(([k, v]) => lastReadTime.set(k, v));
            }
        } catch(e) {}
    }
    
    function saveLastRead() {
        const obj = {};
        lastReadTime.forEach((v, k) => obj[k] = v);
        localStorage.setItem("fembo_lastread", JSON.stringify(obj));
    }
    
    function updateLastRead(chatId) {
        lastReadTime.set(chatId, Date.now());
        saveLastRead();
    }
    
    function getUnreadCount(chatId) {
        const lastRead = lastReadTime.get(chatId) || 0;
        const messages = privateMessages.get(chatId) || [];
        let count = 0;
        for (const msg of messages) {
            if (msg.fromId !== currentUser?.uid && msg.timestamp > lastRead) count++;
        }
        return count;
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = openTabs.map((tab, idx) => {
            const unreadCount = tab.type === "private" ? getUnreadCount(tab.id) : 0;
            const hasUnread = unreadCount > 0;
            const isActive = idx === activeTabIndex;
            const isBlinking = hasUnread && !isActive;
            return `
                <div class="tab ${isActive ? 'active' : ''} ${hasUnread ? 'has-unread' : ''} ${isBlinking ? 'blinking' : ''}" data-index="${idx}">
                    ${tab.type === "global" ? "# " : "💬 "}${escapeHtml(tab.name)}
                    ${unreadCount > 0 && !isActive ? `<span class="unread-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}
                    ${tab.type !== "global" ? `<span class="close-tab" data-index="${idx}">✕</span>` : ''}
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.tab').forEach(tab => {
            const idx = parseInt(tab.dataset.index);
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(idx);
                } else {
                    switchTab(idx);
                }
            });
        });
    }
    
    function switchTab(index) {
        if (currentChat.type === "private") {
            const l = privateListeners.get(currentChat.id);
            if (l) { off(l.ref, 'child_added', l.callback); privateListeners.delete(currentChat.id); }
        }
        activeTabIndex = index;
        currentChat = openTabs[index];
        if (currentChat.type === "private") updateLastRead(currentChat.id);
        else updateLastRead("global");
        renderTabs();
        messagesArea.innerHTML = '';
        if (currentChat.type === "global") {
            if (globalMessages.length === 0) messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
            else globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.userId === currentUser?.uid, false));
        } else {
            const msgs = privateMessages.get(currentChat.id) || [];
            if (msgs.length === 0) messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
            else msgs.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.fromId === currentUser?.uid, false));
            startPrivateListener(currentChat.id);
        }
    }
    
    function closeTab(index) {
        if (openTabs[index].type === "global") return;
        const tab = openTabs[index];
        const l = privateListeners.get(tab.id);
        if (l) { off(l.ref, 'child_added', l.callback); privateListeners.delete(tab.id); }
        openTabs.splice(index, 1);
        saveTabs();
        if (activeTabIndex === index) {
            activeTabIndex = Math.max(0, openTabs.length - 1);
            currentChat = openTabs[activeTabIndex];
            renderTabs();
            messagesArea.innerHTML = '';
            if (currentChat.type === "global") globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.userId === currentUser?.uid, false));
            else {
                const msgs = privateMessages.get(currentChat.id) || [];
                msgs.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.fromId === currentUser?.uid, false));
                startPrivateListener(currentChat.id);
            }
        } else if (activeTabIndex > index) activeTabIndex--;
        renderTabs();
    }
    
    function openPrivateChat(targetId, targetName, targetUniqueId) {
        const existing = openTabs.findIndex(t => t.type === "private" && t.id === targetId);
        if (existing !== -1) { switchTab(existing); return; }
        openTabs.push({ type: "private", id: targetId, name: `${targetName} ${targetUniqueId}` });
        saveTabs();
        renderTabs();
        switchTab(openTabs.length - 1);
    }
    
    function startGlobalListener() {
        if (globalListener) return;
        const globalQuery = query(ref(db, "global_messages"), limitToLast(100));
        globalListener = onChildAdded(globalQuery, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (globalMessageIds.has(msgId)) return;
            globalMessageIds.add(msgId);
            globalMessages.push({ id: msgId, username: data.username, uniqueId: data.uniqueId || "", text: data.text, timestamp: data.timestamp, userId: data.userId });
            globalMessages.sort((a, b) => a.timestamp - b.timestamp);
            if (currentChat.type === "global") {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.userId === currentUser?.uid, false));
            }
        });
    }
    
    function startPrivateListener(targetId) {
        if (privateListeners.has(targetId)) return;
        const chatId = [currentUser?.uid, targetId].sort().join('_');
        const chatRef = ref(db, `private_messages/${chatId}`);
        const chatQuery = query(chatRef, limitToLast(100));
        if (!privateMessageIds.has(targetId)) privateMessageIds.set(targetId, new Set());
        const msgIds = privateMessageIds.get(targetId);
        const callback = (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (msgIds.has(msgId)) return;
            msgIds.add(msgId);
            let msgs = privateMessages.get(targetId) || [];
            msgs.push({ id: msgId, username: data.username, uniqueId: data.uniqueId || "", text: data.text, timestamp: data.timestamp, fromId: data.fromId, toId: data.toId });
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            privateMessages.set(targetId, msgs);
            if (currentChat.type === "private" && currentChat.id === targetId) {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.fromId === currentUser?.uid, false));
            }
        };
        onChildAdded(chatQuery, callback);
        privateListeners.set(targetId, { ref: chatQuery, callback });
    }
    
    // ========== ГЛАВНЫЙ СЛУШАТЕЛЬ - СОЗДАЕТ ВКЛАДКИ ==========
    function setupGlobalPrivateListener() {
        console.log("🔔 СЛУШАТЕЛЬ ЗАПУЩЕН!");
        
        const privateMessagesRef = ref(db, "private_messages");
        
        onChildAdded(privateMessagesRef, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            
            if (!data || !data.text) return;
            if (processedMsgIds.has(msgId)) return;
            processedMsgIds.add(msgId);
            
            console.log(`📨 СООБЩЕНИЕ: кому=${data.toId}, от=${data.fromId}, я=${currentUser?.uid}`);
            
            // ПРОВЕРЯЕМ, ЧТО СООБЩЕНИЕ ДЛЯ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ
            if (currentUser && data.toId === currentUser.uid && data.fromId !== currentUser.uid) {
                const senderId = data.fromId;
                const senderName = data.username;
                const senderUniqueId = data.uniqueId || "";
                
                console.log(`✅ НОВОЕ СООБЩЕНИЕ ОТ: ${senderName}`);
                
                // ДОБАВЛЯЕМ СООБЩЕНИЕ В КЭШ
                if (!privateMessages.has(senderId)) {
                    privateMessages.set(senderId, []);
                    privateMessageIds.set(senderId, new Set());
                }
                const msgs = privateMessages.get(senderId);
                const msgIdsSet = privateMessageIds.get(senderId);
                if (!msgIdsSet.has(msgId)) {
                    msgIdsSet.add(msgId);
                    msgs.push({
                        id: msgId,
                        username: data.username,
                        uniqueId: data.uniqueId || "",
                        text: data.text,
                        timestamp: data.timestamp,
                        fromId: data.fromId,
                        toId: data.toId
                    });
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    privateMessages.set(senderId, msgs);
                }
                
                // ПРОВЕРЯЕМ, ОТКРЫТА ЛИ ВКЛАДКА
                const isTabOpen = openTabs.some(tab => tab.type === "private" && tab.id === senderId);
                
                console.log(`📊 Вкладка открыта: ${isTabOpen}`);
                
                // ЕСЛИ ВКЛАДКА ЗАКРЫТА - СОЗДАЕМ!
                if (!isTabOpen) {
                    console.log(`➕ СОЗДАЮ НОВУЮ ВКЛАДКУ: ${senderName}`);
                    openTabs.push({ type: "private", id: senderId, name: `${senderName} ${senderUniqueId}` });
                    saveTabs();
                    renderTabs(); // МГНОВЕННОЕ ОБНОВЛЕНИЕ
                    
                    // ПОКАЗЫВАЕМ ALERT ДЛЯ ПРОВЕРКИ
                    alert(`🔔 Новое сообщение от ${senderName}! Вкладка добавлена.`);
                    
                    // Системное сообщение
                    const sysDiv = document.createElement("div");
                    sysDiv.className = "system";
                    sysDiv.style.background = "#2a5a2a";
                    sysDiv.style.color = "#ffaa33";
                    sysDiv.style.border = "2px solid #ffaa33";
                    sysDiv.style.padding = "0.5rem";
                    sysDiv.innerHTML = `✨ НОВОЕ ЛИЧНОЕ СООБЩЕНИЕ от ${escapeHtml(senderName)} ${escapeHtml(senderUniqueId)}!`;
                    messagesArea.appendChild(sysDiv);
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                    setTimeout(() => sysDiv.remove(), 8000);
                } else {
                    // Вкладка есть - просто обновляем счетчик
                    renderTabs();
                }
                
                // УВЕДОМЛЕНИЕ
                showToast(`💬 Новое сообщение от ${senderName} ${senderUniqueId}`);
                
                // ЕСЛИ ЧАТ АКТИВЕН - ПОКАЗЫВАЕМ СООБЩЕНИЕ
                const isActive = (currentChat.type === "private" && currentChat.id === senderId);
                if (isActive) {
                    addMessageToDOM(data.username, data.uniqueId || "", data.text, data.timestamp, false, true);
                    updateLastRead(senderId);
                }
            }
        });
    }
    
    // Отправка сообщения
    let lastSend = 0;
    function sendMessage() {
        if (!myUsername || !myUniqueId) { showToast("Загрузка данных..."); return; }
        const text = messageInput.value.trim();
        if (!text) return;
        if (Date.now() - lastSend < 500) { showToast("Подождите"); return; }
        lastSend = Date.now();
        
        if (currentChat.type === "global") {
            push(ref(db, "global_messages"), {
                username: myUsername,
                uniqueId: myUniqueId,
                text: text,
                timestamp: Date.now(),
                userId: currentUser.uid
            }).catch(err => console.error(err));
        } else {
            const chatId = [currentUser.uid, currentChat.id].sort().join('_');
            push(ref(db, `private_messages/${chatId}`), {
                username: myUsername,
                uniqueId: myUniqueId,
                text: text,
                timestamp: Date.now(),
                fromId: currentUser.uid,
                toId: currentChat.id
            }).catch(err => console.error(err));
            updateLastRead(currentChat.id);
        }
        messageInput.value = "";
        messageInput.focus();
    }
    
    function updateStatus() {
        if (!currentUser) return;
        set(ref(db, `users/${currentUser.uid}`), {
            email: currentUser.email,
            username: myUsername,
            uniqueId: myUniqueId,
            lastSeen: Date.now(),
            online: true
        }).catch(err => console.error(err));
    }
    
    function renderUsersList() {
        const term = searchInput.value.toLowerCase();
        const users = Array.from(allUsers.entries())
            .filter(([id, u]) => u.name.toLowerCase().includes(term))
            .sort((a, b) => (b[1].online ? 1 : 0) - (a[1].online ? 1 : 0));
        if (users.length === 0) { usersListDiv.innerHTML = '<div class="system" style="margin:1rem;">◼ Нет пользователей</div>'; return; }
        usersListDiv.innerHTML = users.map(([id, u]) => `
            <div class="user-item" data-id="${id}" data-name="${u.name}" data-uniqueid="${u.uniqueId}">
                <div><span class="user-name">${escapeHtml(u.name)}</span><span class="user-id">${escapeHtml(u.uniqueId)}</span></div>
                <div class="user-status ${u.online ? 'status-online' : 'status-offline'}"></div>
            </div>
        `).join('');
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => openPrivateChat(el.dataset.id, el.dataset.name, el.dataset.uniqueid));
        });
    }
    
    onValue(ref(db, "users"), (snapshot) => {
        const data = snapshot.val();
        allUsers.clear();
        if (data) {
            const now = Date.now();
            for (let id in data) {
                if (id !== currentUser?.uid) {
                    const online = (now - (data[id].lastSeen || 0) < 120000);
                    allUsers.set(id, { name: data[id].username, uniqueId: data[id].uniqueId, online });
                }
            }
        }
        renderUsersList();
    });
    
    searchInput.addEventListener("input", renderUsersList);
    
    // Auth Modal
    function showAuthModal() {
        const modal = document.createElement("div");
        modal.className = "auth-overlay";
        modal.innerHTML = `
            <div class="auth-modal">
                <h2 id="authTitle">◼ Вход в Fembo</h2>
                <input type="email" id="authEmail" class="auth-input" placeholder="Email">
                <input type="password" id="authPassword" class="auth-input" placeholder="Пароль (мин. 6)">
                <button id="authSubmitBtn" class="auth-btn">Войти</button>
                <div class="auth-switch" id="authSwitch">Нет аккаунта? <span>Зарегистрироваться</span></div>
                <div id="authError" class="auth-error"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let isLogin = true;
        const authTitle = modal.querySelector("#authTitle");
        const authSubmitBtn = modal.querySelector("#authSubmitBtn");
        const authSwitch = modal.querySelector("#authSwitch");
        const authError = modal.querySelector("#authError");
        const emailInput = modal.querySelector("#authEmail");
        const passwordInput = modal.querySelector("#authPassword");
        
        function updateForm() {
            if (isLogin) {
                authTitle.textContent = "◼ Вход в Fembo";
                authSubmitBtn.textContent = "Войти";
                authSwitch.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
            } else {
                authTitle.textContent = "◼ Регистрация в Fembo";
                authSubmitBtn.textContent = "Зарегистрироваться";
                authSwitch.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            }
            authError.textContent = "";
        }
        
        authSwitch.addEventListener("click", () => { isLogin = !isLogin; updateForm(); });
        
        authSubmitBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) { authError.textContent = "Заполните все поля"; return; }
            if (!isLogin && password.length < 6) { authError.textContent = "Пароль должен быть не менее 6 символов"; return; }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const uniqueId = await getUniqueUserId();
                    const defaultName = email.split('@')[0];
                    await saveUserToDatabase(userCredential.user.uid, email, defaultName, uniqueId);
                }
                modal.remove();
            } catch (error) {
                let errorMessage = "Ошибка: ";
                switch (error.code) {
                    case "auth/email-already-in-use": errorMessage += "Email уже используется"; break;
                    case "auth/invalid-email": errorMessage += "Некорректный email"; break;
                    case "auth/user-not-found": errorMessage += "Пользователь не найден"; break;
                    case "auth/wrong-password": errorMessage += "Неверный пароль"; break;
                    default: errorMessage += error.message;
                }
                authError.textContent = errorMessage;
            }
        });
        
        emailInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
        passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
    }
    
    // Инициализация
    async function initChat(user) {
        currentUser = user;
        const userData = await loadUserData(user.uid);
        
        if (userData && userData.username && userData.uniqueId) {
            myUsername = userData.username;
            myUniqueId = userData.uniqueId;
        } else {
            myUsername = user.email.split('@')[0];
            myUniqueId = generateUniqueId();
            await saveUserToDatabase(user.uid, user.email, myUsername, myUniqueId);
            await set(ref(db, `unique_ids/${myUniqueId}`), { taken: true, userId: user.uid });
        }
        
        userNicknameSpan.textContent = myUsername;
        userIdDisplaySpan.textContent = myUniqueId;
        chatContainer.style.display = "flex";
        
        loadTabs();
        loadLastRead();
        startGlobalListener();
        setupGlobalPrivateListener(); // ЗАПУСКАЕМ СЛУШАТЕЛЬ
        updateStatus();
        setInterval(updateStatus, 30000);
        renderTabs();
        
        setTimeout(() => {
            openTabs.forEach(tab => { if (tab.type === "private") startPrivateListener(tab.id); });
        }, 1000);
        
        console.log("🚀 ЧАТ ЗАПУЩЕН!");
    }
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            initChat(user);
        } else {
            chatContainer.style.display = "none";
            showAuthModal();
        }
    });
    
    editNameBtn.addEventListener("click", async () => {
        const newName = prompt("Введите ваше имя:", myUsername);
        if (newName && newName.trim()) {
            myUsername = newName.trim().slice(0, 24);
            await set(ref(db, `users/${currentUser.uid}/username`), myUsername);
            userNicknameSpan.textContent = myUsername;
            updateStatus();
            showToast(`Имя изменено на ${myUsername}`);
        }
    });
    
    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        location.reload();
    });
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("Ссылка скопирована");
    });
    
    window.addEventListener("beforeunload", () => {
        if (currentUser) {
            set(ref(db, `users/${currentUser.uid}`), { email: currentUser.email, username: myUsername, uniqueId: myUniqueId, lastSeen: Date.now(), online: false });
        }
    });
</script>
</body>
</html>
