<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkChat — Облачный чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px black;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.4rem;
            color: #e2e8f0;
        }
        .badge {
            background: #2d3a5e;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .copy-btn {
            background: #334155;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #475569; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        .message.own { align-self: flex-end; }
        .bubble {
            background: #1e293b;
            padding: 10px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }
        .message.own .bubble {
            background: linear-gradient(135deg, #3b4e8c, #2c3e6e);
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 18px;
        }
        .text { word-break: break-word; font-size: 0.95rem; }
        .meta {
            display: flex;
            gap: 12px;
            font-size: 0.65rem;
            margin-top: 5px;
            color: #7c8ba0;
        }
        .message.own .meta { justify-content: flex-end; }
        .name { font-weight: 600; color: #a5b4fc; }
        .system-msg {
            text-align: center;
            font-size: 0.7rem;
            color: #8b9dc3;
            background: rgba(15, 23, 42, 0.6);
            margin: 0.2rem auto;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            width: fit-content;
        }
        .input-area {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 1.2rem 1.2rem;
            display: flex;
            gap: 0.8rem;
            border-top: 1px solid #334155;
            flex-wrap: wrap;
        }
        .input-area input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        #username { width: 140px; }
        #message { flex: 1; min-width: 150px; }
        .input-area button {
            background: linear-gradient(135deg, #3b4e8c, #2c3e6e);
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover { opacity: 0.9; transform: translateY(-1px); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .input-area { flex-direction: column; }
            #username { width: 100%; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="chat">
    <div class="header">
        <div style="display: flex; gap: 12px; align-items: baseline;">
            <h1>🌐 LinkChat</h1>
            <div class="badge">облачный чат</div>
        </div>
        <button class="copy-btn" id="copyLink">🔗 Поделиться ссылкой</button>
    </div>
    <div class="messages" id="messages">
        <div class="system-msg">💬 Подключение к чату...</div>
    </div>
    <div class="input-area">
        <input type="text" id="username" placeholder="Ваше имя" maxlength="24">
        <input type="text" id="message" placeholder="Напишите сообщение..." maxlength="500">
        <button id="send">📨 Отправить</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, remove } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:0e6c56767327f0dbd30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "chat_messages");
    
    const messagesDiv = document.getElementById("messages");
    const usernameInput = document.getElementById("username");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("send");
    const copyBtn = document.getElementById("copyLink");
    
    let userId = localStorage.getItem("user_id");
    if (!userId) {
        userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("user_id", userId);
    }
    
    let currentName = localStorage.getItem("chat_name") || "Гость_" + Math.floor(Math.random() * 1000);
    usernameInput.value = currentName;
    
    usernameInput.addEventListener("change", () => {
        currentName = usernameInput.value.trim() || "Аноним";
        localStorage.setItem("chat_name", currentName);
    });
    
    function addMessage(name, text, timestamp, isOwn = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isOwn ? "own" : ""}`;
        const time = new Date(timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        msgDiv.innerHTML = `
            <div class="bubble">
                <div class="text">${escapeHtml(text)}</div>
                <div class="meta">
                    <span class="name">${escapeHtml(name)}</span>
                    <span>${time}</span>
                </div>
            </div>
        `;
        messagesDiv.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: "smooth", block: "end" });
    }
    
    function addSystemMsg(text) {
        const sys = document.createElement("div");
        sys.className = "system-msg";
        sys.innerHTML = `💬 ${escapeHtml(text)}`;
        messagesDiv.appendChild(sys);
        sys.scrollIntoView({ behavior: "smooth", block: "end" });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        push(messagesRef, {
            name: currentName,
            text: text,
            time: Date.now(),
            userId: userId
        });
        
        messageInput.value = "";
        messageInput.focus();
    }
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
    
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        addSystemMsg("✅ Ссылка скопирована! Поделитесь с друзьями.");
    });
    
    const recentQuery = query(messagesRef, limitToLast(100));
    
    onChildAdded(recentQuery, (snapshot) => {
        const data = snapshot.val();
        const isOwn = (data.userId === userId);
        addMessage(data.name, data.text, data.time, isOwn);
    });
    
    // Статус онлайн
    const statusRef = ref(db, `online/${userId}`);
    set(statusRef, { name: currentName, lastSeen: Date.now() });
    
    onValue(ref(db, "online"), (snapshot) => {
        const users = snapshot.val();
        if (users) {
            const now = Date.now();
            let online = 0;
            for (let id in users) {
                if (now - (users[id].lastSeen || 0) < 60000) online++;
                else remove(ref(db, `online/${id}`));
            }
            const statusDiv = document.querySelector(".system-msg:first-child");
            if (statusDiv) statusDiv.innerHTML = `🟢 Онлайн: ${online} человек. Чат работает глобально!`;
        }
    });
    
    setInterval(() => {
        set(statusRef, { name: currentName, lastSeen: Date.now() });
    }, 30000);
    
    window.addEventListener("beforeunload", () => {
        remove(statusRef);
    });
    
    addSystemMsg(`Добро пожаловать, ${currentName}! Поделитесь ссылкой с друзьями.`);
</script>
</body>
</html>
