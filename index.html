<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fembo — Чат с личными сообщениями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .chat-container {
            max-width: 1200px;
            width: 100%;
            height: 90vh;
            min-height: 550px;
            background: #0a0a0a;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            width: 280px;
            background: #000000;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .sidebar-header h3 {
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .search-box {
            width: 100%;
            background: #111111;
            border: 1px solid #2a2a2a;
            padding: 0.6rem;
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none;
        }

        .search-box:focus {
            border-color: #4a4a4a;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem;
            margin: 0.2rem 0;
            background: #111111;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            background: #1a1a1a;
            border-color: #4a4a4a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            font-size: 1.2rem;
        }

        .user-name {
            color: #e0e0e0;
            font-size: 0.85rem;
        }

        .user-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-online {
            background: #2ecc71;
        }

        .status-offline {
            background: #7f8c8d;
        }

        .users-list::-webkit-scrollbar {
            width: 6px;
        }

        .users-list::-webkit-scrollbar-track {
            background: #000000;
        }

        .users-list::-webkit-scrollbar-thumb {
            background: #2a2a2a;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #000000;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 24px;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        .copy-link-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            font-size: 0.85rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .copy-link-btn:hover {
            background: #3a3a3a;
        }

        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 1rem;
            gap: 0.5rem;
            overflow-x: auto;
        }

        .tab {
            padding: 0.7rem 1.2rem;
            background: #111111;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            color: #aaaaaa;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab.active {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #4a4a4a;
            border-bottom-color: #1a1a1a;
            margin-bottom: -1px;
        }

        .close-tab {
            margin-left: 8px;
            color: #888888;
            cursor: pointer;
            font-size: 1rem;
        }

        .close-tab:hover {
            color: #ff8888;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
            background: #0f0f0f;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }

        .message.own {
            align-self: flex-end;
            margin-left: auto;
        }

        .message-bubble {
            background: #1e1e1e;
            padding: 0.8rem 1.2rem;
            color: #e0e0e0;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.45;
            border: 1px solid #2a2a2a;
            display: inline-block;
            width: fit-content;
            max-width: 100%;
        }

        .message.own .message-bubble {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ffffff;
        }

        .message-sender {
            font-size: 0.7rem;
            color: #888888;
            margin-top: 0.3rem;
            padding: 0 0.2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .message.own .message-sender {
            justify-content: flex-end;
        }

        .sender-name {
            font-weight: 600;
            color: #aaaaaa;
        }

        .message-time {
            color: #666666;
        }

        .system-message {
            text-align: center;
            font-size: 0.75rem;
            color: #888888;
            background: #111111;
            margin: 0.3rem auto;
            padding: 0.4rem 1rem;
            width: fit-content;
            max-width: 90%;
            border: 1px solid #222222;
        }

        .input-area {
            background: #0a0a0a;
            padding: 1rem 1.5rem 1.2rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            background: #111111;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem 0.5rem;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        button:hover {
            background: #2a2a2a;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2a2a;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 999;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>◼ Пользователи</h3>
            <input type="text" id="searchUsers" class="search-box" placeholder="Поиск по нику...">
        </div>
        <div class="users-list" id="usersList">
            <div class="system-message" style="margin: 1rem;">Загрузка...</div>
        </div>
    </div>

    <div class="main-area">
        <div class="chat-header">
            <div class="brand">
                <div class="logo">🦊</div>
                <h1>Fembo</h1>
            </div>
            <button class="copy-link-btn" id="copyLinkButton">⎘ Поделиться</button>
        </div>

        <div class="tabs" id="tabsContainer">
            <div class="tab active" data-chat="global"># Общий чат</div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="system-message">◼ Выберите чат или напишите сообщение в общий чат</div>
        </div>

        <div class="input-area">
            <div class="message-input-wrapper">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." maxlength="500">
            </div>
            <button id="sendButton">◼ Отправить</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, remove, off } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    const messagesRef = ref(db, "messages");
    
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendButton");
    const copyLinkBtn = document.getElementById("copyLinkButton");
    const usersListDiv = document.getElementById("usersList");
    const searchInput = document.getElementById("searchUsers");
    const tabsContainer = document.getElementById("tabsContainer");
    
    let userId = localStorage.getItem("fembo_user_id");
    if (!userId) {
        userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
        localStorage.setItem("fembo_user_id", userId);
    }
    
    let currentUsername = localStorage.getItem("fembo_username") || "Гость_" + Math.floor(Math.random() * 1000);
    
    let currentChat = { type: "global", id: null, name: "Общий чат" };
    let openTabs = [{ type: "global", id: null, name: "Общий чат" }];
    let activeTabIndex = 0;
    let allUsers = new Map();
    let currentMessageListener = null;
    let processedMessageIds = new Set(); // Храним ID обработанных сообщений
    
    // Генерация уникального ID для сообщения
    function generateMessageId() {
        return Date.now() + "_" + Math.random().toString(36).substr(2, 9);
    }
    
    function showNamePrompt() {
        const name = prompt("Введите ваше имя:", currentUsername);
        if (name && name.trim()) {
            currentUsername = name.trim().slice(0, 24);
            localStorage.setItem("fembo_username", currentUsername);
            updateUserStatus();
        }
    }
    
    setTimeout(() => {
        if (currentUsername.startsWith("Гость_")) {
            showNamePrompt();
        }
    }, 500);
    
    function updateUserStatus() {
        const userStatusRef = ref(db, `users/${userId}`);
        set(userStatusRef, {
            username: currentUsername,
            lastSeen: Date.now(),
            online: true,
            userId: userId
        });
    }
    
    onValue(ref(db, "users"), (snapshot) => {
        const users = snapshot.val();
        allUsers.clear();
        if (users) {
            const now = Date.now();
            for (let id in users) {
                const user = users[id];
                const isOnline = (now - (user.lastSeen || 0) < 120000);
                allUsers.set(id, {
                    name: user.username,
                    online: isOnline,
                    lastSeen: user.lastSeen
                });
            }
        }
        renderUsersList();
    });
    
    function renderUsersList() {
        const searchTerm = searchInput.value.toLowerCase();
        const users = Array.from(allUsers.entries())
            .filter(([id, data]) => id !== userId && data.name.toLowerCase().includes(searchTerm))
            .sort((a, b) => {
                if (a[1].online !== b[1].online) return b[1].online ? 1 : -1;
                return a[1].name.localeCompare(b[1].name);
            });
        
        if (users.length === 0) {
            usersListDiv.innerHTML = '<div class="system-message" style="margin: 1rem;">◼ Нет других пользователей</div>';
            return;
        }
        
        usersListDiv.innerHTML = users.map(([id, data]) => `
            <div class="user-item" data-user-id="${id}" data-user-name="${data.name}">
                <div class="user-info">
                    <span class="user-avatar">🦊</span>
                    <span class="user-name">${escapeHtml(data.name)}</span>
                </div>
                <div class="user-status ${data.online ? 'status-online' : 'status-offline'}"></div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => {
                const targetId = el.dataset.userId;
                const targetName = el.dataset.userName;
                openPrivateChat(targetId, targetName);
            });
        });
    }
    
    searchInput.addEventListener("input", renderUsersList);
    
    function openPrivateChat(targetUserId, targetUserName) {
        const existingTabIndex = openTabs.findIndex(tab => tab.type === "private" && tab.id === targetUserId);
        if (existingTabIndex !== -1) {
            switchToTab(existingTabIndex);
            return;
        }
        
        openTabs.push({
            type: "private",
            id: targetUserId,
            name: targetUserName
        });
        
        renderTabs();
        switchToTab(openTabs.length - 1);
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = openTabs.map((tab, index) => `
            <div class="tab ${index === activeTabIndex ? 'active' : ''}" data-index="${index}">
                ${tab.type === "global" ? "# " : "💬 "}${escapeHtml(tab.name)}
                ${tab.type !== "global" ? `<span class="close-tab" data-index="${index}">✕</span>` : ''}
            </div>
        `).join('');
        
        document.querySelectorAll('.tab').forEach(tab => {
            const index = parseInt(tab.dataset.index);
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(index);
                } else {
                    switchToTab(index);
                }
            });
        });
    }
    
    function switchToTab(index) {
        activeTabIndex = index;
        currentChat = openTabs[index];
        renderTabs();
        loadMessages();
    }
    
    function closeTab(index) {
        if (openTabs[index].type === "global") return;
        openTabs.splice(index, 1);
        if (activeTabIndex >= openTabs.length) {
            activeTabIndex = openTabs.length - 1;
        }
        if (activeTabIndex < 0) activeTabIndex = 0;
        currentChat = openTabs[activeTabIndex];
        renderTabs();
        loadMessages();
    }
    
    function loadMessages() {
        // Отключаем старый слушатель
        if (currentMessageListener && currentMessageListener.off) {
            currentMessageListener.off();
        }
        
        // Очищаем processedMessageIds при смене чата
        processedMessageIds.clear();
        
        messagesArea.innerHTML = '<div class="system-message">◼ Загрузка сообщений...</div>';
        
        let messagesQuery;
        let callback;
        
        if (currentChat.type === "global") {
            messagesQuery = query(messagesRef, limitToLast(100));
            callback = (snapshot) => {
                const data = snapshot.val();
                const messageId = snapshot.key;
                
                // Проверяем, не обрабатывали ли уже это сообщение
                if (processedMessageIds.has(messageId)) return;
                processedMessageIds.add(messageId);
                
                if (data && data.username && data.text) {
                    const isOwn = (data.userId === userId);
                    addMessageToDOM(data.username, data.text, data.timestamp, isOwn);
                    clearLoadingMessage();
                }
            };
            currentMessageListener = onChildAdded(messagesQuery, callback);
        } else {
            const chatId = [userId, currentChat.id].sort().join('_');
            const privateChatRef = ref(db, `private_messages/${chatId}`);
            messagesQuery = query(privateChatRef, limitToLast(100));
            callback = (snapshot) => {
                const data = snapshot.val();
                const messageId = snapshot.key;
                
                if (processedMessageIds.has(messageId)) return;
                processedMessageIds.add(messageId);
                
                if (data && data.username && data.text) {
                    const isOwn = (data.fromId === userId);
                    addMessageToDOM(data.username, data.text, data.timestamp, isOwn);
                    clearLoadingMessage();
                }
            };
            currentMessageListener = onChildAdded(messagesQuery, callback);
        }
        
        function clearLoadingMessage() {
            const loadingMsg = messagesArea.querySelector(".system-message");
            if (loadingMsg && loadingMsg.innerText.includes("Загрузка")) {
                loadingMsg.remove();
            }
        }
    }
    
    function addMessageToDOM(username, text, timestamp, isOwn = false) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        messageDiv.innerHTML = `
            <div class="message-bubble">${escapeHtml(text)}</div>
            <div class="message-sender">
                <span class="sender-name">${escapeHtml(username)}</span>
                <span class="message-time">${timeStr}</span>
            </div>
        `;
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function addSystemMessage(text) {
        const sysDiv = document.createElement("div");
        sysDiv.className = "system-message";
        sysDiv.innerHTML = `◼ ${escapeHtml(text)}`;
        messagesArea.appendChild(sysDiv);
        scrollToBottom();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 50);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Блокировка повторной отправки
    let lastSendTime = 0;
    const SEND_DELAY = 500; // 500ms задержка между отправками
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        const now = Date.now();
        if (now - lastSendTime < SEND_DELAY) {
            showToast("◼ Подождите перед отправкой следующего сообщения");
            return;
        }
        
        lastSendTime = now;
        
        const username = currentUsername.trim() || "Аноним";
        const messageId = generateMessageId();
        
        if (currentChat.type === "global") {
            push(messagesRef, {
                username: username,
                text: text,
                timestamp: Date.now(),
                userId: userId,
                messageId: messageId
            }).catch(error => {
                console.error("Ошибка:", error);
                showToast("◼ Ошибка отправки");
                lastSendTime = 0;
            });
        } else {
            const chatId = [userId, currentChat.id].sort().join('_');
            const privateChatRef = ref(db, `private_messages/${chatId}`);
            push(privateChatRef, {
                username: username,
                text: text,
                timestamp: Date.now(),
                fromId: userId,
                toId: currentChat.id,
                messageId: messageId
            }).catch(error => {
                console.error("Ошибка:", error);
                showToast("◼ Ошибка отправки");
                lastSendTime = 0;
            });
        }
        
        messageInput.value = "";
        messageInput.focus();
    }
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
    
    copyLinkBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("◼ Ссылка скопирована");
    });
    
    function showToast(text) {
        let toast = document.querySelector(".toast-msg");
        if (toast) toast.remove();
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.innerText = text;
        document.body.appendChild(div);
        setTimeout(() => {
            div.style.opacity = "0";
            setTimeout(() => div.remove(), 300);
        }, 2000);
    }
    
    updateUserStatus();
    const statusInterval = setInterval(updateUserStatus, 30000);
    
    window.addEventListener("beforeunload", () => {
        clearInterval(statusInterval);
        const userStatusRef = ref(db, `users/${userId}`);
        set(userStatusRef, {
            username: currentUsername,
            lastSeen: Date.now(),
            online: false,
            userId: userId
        });
    });
    
    addSystemMessage(`Добро пожаловать, ${currentUsername}. Нажмите на пользователя справа чтобы начать личный чат.`);
    loadMessages();
</script>
</body>
</html>
