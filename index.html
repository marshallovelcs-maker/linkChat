<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fembo — Чат с регистрацией</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 1200px;
            width: 100%;
            height: 90vh;
            background: #0a0a0a;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #000;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .sidebar-header h3 { color: #fff; font-size: 0.9rem; }
        .search-box {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.6rem;
            color: #e0e0e0;
            margin-top: 0.5rem;
            outline: none;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem;
            margin: 0.2rem 0;
            background: #111;
            border: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .user-item:hover { background: #1a1a1a; }
        .user-name { color: #e0e0e0; font-size: 0.85rem; }
        .user-id { color: #666; font-size: 0.7rem; font-family: monospace; margin-left: 0.5rem; }
        .user-status { width: 8px; height: 8px; border-radius: 50%; }
        .status-online { background: #2ecc71; }
        .status-offline { background: #7f8c8d; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            background: #000;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 24px; }
        h1 { font-size: 1.2rem; color: #fff; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #3a3a3a;
        }
        .user-info span:first-child { color: #888; font-size: 0.7rem; }
        .user-info .nickname {
            color: #ffaa66;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .user-info .user-id-display {
            color: #666;
            font-size: 0.7rem;
            font-family: monospace;
        }
        .edit-name-btn {
            background: #2a2a2a;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }
        .edit-name-btn:hover { background: #3a3a3a; color: #fff; }
        .logout-btn {
            background: #2a2a2a;
            border: 1px solid #5a3a3a;
            color: #ff8888;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        .logout-btn:hover { background: #3a2a2a; color: #ffaaaa; }
        .copy-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 0.5rem;
            gap: 0.3rem;
            overflow-x: auto;
            min-height: 45px;
        }
        .tab {
            padding: 0.5rem 1rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            position: relative;
        }
        .tab.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #4a4a4a;
            margin-bottom: -1px;
        }
        .tab.blinking {
            animation: blink 0.6s ease-in-out infinite;
            background: #2a5a2a;
            color: #fff;
        }
        @keyframes blink {
            0%, 100% { background: #2a5a2a; }
            50% { background: #ffaa33; color: #000; }
        }
        .close-tab { margin-left: 6px; color: #888; cursor: pointer; font-size: 0.7rem; }
        .close-tab:hover { color: #ff8888; }
        .unread-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 5px;
            border-radius: 10px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            background: #0f0f0f;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }
        .message.own { align-self: flex-end; }
        .bubble {
            background: #1e1e1e;
            padding: 0.6rem 1rem;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }
        .message.own .bubble { background: #2a2a2a; }
        .sender {
            font-size: 0.65rem;
            color: #888;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .message.own .sender { justify-content: flex-end; }
        .sender-name { font-weight: 600; color: #aaa; }
        .sender-id { color: #666; font-family: monospace; }
        .message-time { color: #666; }
        .system {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            background: #111;
            padding: 0.3rem;
            margin: 0.2rem auto;
            width: fit-content;
            border: 1px solid #222;
            border-radius: 4px;
        }
        .input-area {
            background: #0a0a0a;
            padding: 0.8rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.5rem;
        }
        .input-wrapper {
            flex: 1;
            background: #111;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }
        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 0.6rem 0.3rem;
            color: #e0e0e0;
            outline: none;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.5rem 1rem;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 6px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a2a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            z-index: 1000;
        }
        
        /* Auth Modal */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-modal {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }
        .auth-modal h2 {
            color: #fff;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }
        .auth-input {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
        }
        .auth-input:focus { border-color: #4a4a4a; }
        .auth-btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .auth-btn:hover { background: #2a2a2a; }
        .auth-switch {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .auth-switch span { color: #ffaa66; text-decoration: underline; }
        .auth-error {
            color: #ff8888;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="chat-container" id="chatContainer" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>◼ Пользователи</h3>
            <input type="text" id="searchUsers" class="search-box" placeholder="Поиск...">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    <div class="main-area">
        <div class="chat-header">
            <div class="brand">
                <div class="logo">🦊</div>
                <h1>Fembo</h1>
            </div>
            <div class="user-info">
                <span>👤</span>
                <span class="nickname" id="userNickname"></span>
                <span class="user-id-display" id="userIdDisplay"></span>
                <button class="edit-name-btn" id="editNameBtn">✎</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                <button class="copy-btn" id="copyBtn">⎘</button>
            </div>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-wrapper"><input type="text" id="messageInput" placeholder="Напишите сообщение..."></div>
            <button id="sendBtn">◼ Отправить</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, off, get } from "firebase/database";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // DOM
    const chatContainer = document.getElementById("chatContainer");
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const copyBtn = document.getElementById("copyBtn");
    const usersListDiv = document.getElementById("usersList");
    const searchInput = document.getElementById("searchUsers");
    const tabsContainer = document.getElementById("tabsContainer");
    const userNicknameSpan = document.getElementById("userNickname");
    const userIdDisplaySpan = document.getElementById("userIdDisplay");
    const editNameBtn = document.getElementById("editNameBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    
    // State
    let currentUser = null;
    let userData = null;
    let currentChat = { type: "global", id: null, name: "Общий чат" };
    let openTabs = [{ type: "global", id: null, name: "Общий чат" }];
    let activeTabIndex = 0;
    let allUsers = new Map();
    
    // Message caches
    let globalMessages = [];
    let globalMessageIds = new Set();
    let privateMessages = new Map();
    let privateMessageIds = new Map();
    
    // Время последнего прочтения
    let lastReadTime = new Map();
    
    // Listeners
    let globalListener = null;
    let privateListeners = new Map();
    let globalPrivateListener = null;
    
    // Генерация уникального ID в формате 000000A (без #)
    function generateUniqueId() {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const randomLetter = letters[Math.floor(Math.random() * letters.length)];
        const randomNumbers = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        return `${randomNumbers}${randomLetter}`;
    }
    
    // Проверка уникальности ID в Firebase
    async function getUniqueUserId() {
        let uniqueId;
        let isUnique = false;
        let attempts = 0;
        
        while (!isUnique && attempts < 50) {
            uniqueId = generateUniqueId();
            const idRef = ref(db, `unique_ids/${uniqueId}`);
            const snapshot = await get(idRef);
            if (!snapshot.exists()) {
                isUnique = true;
                await set(idRef, { taken: true, userId: auth.currentUser?.uid });
            }
            attempts++;
        }
        return uniqueId;
    }
    
    // Сохранение данных пользователя
    async function saveUserData(userId, email, username, uniqueId) {
        await set(ref(db, `users/${userId}`), {
            email: email,
            username: username,
            uniqueId: uniqueId,
            lastSeen: Date.now(),
            online: true
        });
        console.log("✅ Данные пользователя сохранены:", { username, uniqueId });
    }
    
    // Получение данных пользователя
    async function getUserData(userId) {
        const snapshot = await get(ref(db, `users/${userId}`));
        return snapshot.val();
    }
    
    // Обновление ника
    async function updateUsername(newName) {
        if (!currentUser) return;
        await set(ref(db, `users/${currentUser.uid}/username`), newName);
        if (userData) userData.username = newName;
        userNicknameSpan.textContent = newName;
        updateStatus();
        showToast(`Имя изменено на ${newName}`);
    }
    
    // Auth Modal
    function showAuthModal() {
        const modal = document.createElement("div");
        modal.className = "auth-overlay";
        modal.innerHTML = `
            <div class="auth-modal">
                <h2 id="authTitle">◼ Вход в Fembo</h2>
                <input type="email" id="authEmail" class="auth-input" placeholder="Email" autocomplete="email">
                <input type="password" id="authPassword" class="auth-input" placeholder="Пароль (мин. 6 символов)" autocomplete="current-password">
                <button id="authSubmitBtn" class="auth-btn">Войти</button>
                <div class="auth-switch" id="authSwitch">
                    Нет аккаунта? <span>Зарегистрироваться</span>
                </div>
                <div id="authError" class="auth-error"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let isLogin = true;
        const authTitle = modal.querySelector("#authTitle");
        const authSubmitBtn = modal.querySelector("#authSubmitBtn");
        const authSwitch = modal.querySelector("#authSwitch");
        const authError = modal.querySelector("#authError");
        const emailInput = modal.querySelector("#authEmail");
        const passwordInput = modal.querySelector("#authPassword");
        
        function updateForm() {
            if (isLogin) {
                authTitle.textContent = "◼ Вход в Fembo";
                authSubmitBtn.textContent = "Войти";
                authSwitch.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
            } else {
                authTitle.textContent = "◼ Регистрация в Fembo";
                authSubmitBtn.textContent = "Зарегистрироваться";
                authSwitch.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            }
            authError.textContent = "";
        }
        
        authSwitch.addEventListener("click", () => {
            isLogin = !isLogin;
            updateForm();
        });
        
        authSubmitBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                authError.textContent = "Заполните все поля";
                return;
            }
            
            if (!isLogin && password.length < 6) {
                authError.textContent = "Пароль должен быть не менее 6 символов";
                return;
            }
            
            try {
                if (isLogin) {
                    const result = await signInWithEmailAndPassword(auth, email, password);
                    console.log("✅ Вход выполнен:", result.user.email);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const newUser = userCredential.user;
                    console.log("✅ Регистрация успешна:", newUser.email);
                    
                    const uniqueId = await getUniqueUserId();
                    const defaultName = email.split('@')[0];
                    
                    await saveUserData(newUser.uid, email, defaultName, uniqueId);
                    console.log("✅ ID пользователя:", uniqueId);
                }
                modal.remove();
            } catch (error) {
                console.error("❌ Ошибка авторизации:", error);
                let errorMessage = "Ошибка: ";
                switch (error.code) {
                    case "auth/email-already-in-use":
                        errorMessage += "Email уже используется";
                        break;
                    case "auth/invalid-email":
                        errorMessage += "Некорректный email";
                        break;
                    case "auth/user-not-found":
                        errorMessage += "Пользователь не найден";
                        break;
                    case "auth/wrong-password":
                        errorMessage += "Неверный пароль";
                        break;
                    default:
                        errorMessage += error.message;
                }
                authError.textContent = errorMessage;
            }
        });
        
        emailInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
        passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
    }
    
    // Функции чата
    function showToast(msg) {
        let t = document.querySelector(".toast");
        if (t) t.remove();
        const d = document.createElement("div");
        d.className = "toast";
        d.innerHTML = `📩 ${escapeHtml(msg)}`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function addMessageToDOM(name, uniqueId, text, ts, isOwn) {
        const div = document.createElement("div");
        div.className = `message ${isOwn ? 'own' : ''}`;
        const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="sender">
                <span class="sender-name">${escapeHtml(name)}</span>
                <span class="sender-id">${escapeHtml(uniqueId)}</span>
                <span class="message-time">${time}</span>
            </div>
        `;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function saveTabs() {
        const tabs = openTabs.filter(t => t.type === "private").map(t => ({ id: t.id, name: t.name }));
        localStorage.setItem("fembo_tabs", JSON.stringify(tabs));
    }
    
    function loadTabs() {
        try {
            const saved = localStorage.getItem("fembo_tabs");
            if (saved) {
                const tabs = JSON.parse(saved);
                openTabs = [{ type: "global", id: null, name: "Общий чат" }];
                tabs.forEach(t => openTabs.push({ type: "private", id: t.id, name: t.name }));
            }
        } catch(e) {}
    }
    
    function loadLastRead() {
        try {
            const saved = localStorage.getItem("fembo_lastread");
            if (saved) {
                const obj = JSON.parse(saved);
                lastReadTime.clear();
                Object.entries(obj).forEach(([k, v]) => lastReadTime.set(k, v));
            }
        } catch(e) {}
    }
    
    function saveLastRead() {
        const obj = {};
        lastReadTime.forEach((v, k) => obj[k] = v);
        localStorage.setItem("fembo_lastread", JSON.stringify(obj));
    }
    
    function updateLastRead(chatId) {
        const now = Date.now();
        lastReadTime.set(chatId, now);
        saveLastRead();
    }
    
    function getUnreadCount(chatId) {
        const lastRead = lastReadTime.get(chatId) || 0;
        const messages = privateMessages.get(chatId) || [];
        let count = 0;
        for (const msg of messages) {
            if (msg.fromId !== currentUser?.uid && msg.timestamp > lastRead) {
                count++;
            }
        }
        return count;
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = openTabs.map((tab, idx) => {
            const unread = tab.type === "private" ? getUnreadCount(tab.id) : 0;
            const isBlinking = unread > 0 && idx !== activeTabIndex;
            return `
                <div class="tab ${idx === activeTabIndex ? 'active' : ''} ${isBlinking ? 'blinking' : ''}" data-index="${idx}">
                    ${tab.type === "global" ? "# " : "💬 "}${escapeHtml(tab.name)}
                    ${unread > 0 && idx !== activeTabIndex ? `<span class="unread-badge">${unread > 9 ? '9+' : unread}</span>` : ''}
                    ${tab.type !== "global" ? `<span class="close-tab" data-index="${idx}">✕</span>` : ''}
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.tab').forEach(tab => {
            const idx = parseInt(tab.dataset.index);
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(idx);
                } else {
                    switchTab(idx);
                }
            });
        });
    }
    
    function switchTab(index) {
        if (currentChat.type === "private") {
            const l = privateListeners.get(currentChat.id);
            if (l) {
                off(l.ref, 'child_added', l.callback);
                privateListeners.delete(currentChat.id);
            }
        }
        
        activeTabIndex = index;
        currentChat = openTabs[index];
        
        if (currentChat.type === "private") {
            updateLastRead(currentChat.id);
        } else {
            updateLastRead("global");
        }
        
        renderTabs();
        messagesArea.innerHTML = '';
        
        if (currentChat.type === "global") {
            if (globalMessages.length === 0) {
                messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
            } else {
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.userId === currentUser?.uid);
                });
            }
        } else {
            const msgs = privateMessages.get(currentChat.id) || [];
            if (msgs.length === 0) {
                messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
            } else {
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.fromId === currentUser?.uid);
                });
            }
            startPrivateListener(currentChat.id);
        }
    }
    
    function closeTab(index) {
        if (openTabs[index].type === "global") return;
        const tab = openTabs[index];
        const l = privateListeners.get(tab.id);
        if (l) {
            off(l.ref, 'child_added', l.callback);
            privateListeners.delete(tab.id);
        }
        openTabs.splice(index, 1);
        saveTabs();
        
        if (activeTabIndex === index) {
            activeTabIndex = Math.max(0, openTabs.length - 1);
            currentChat = openTabs[activeTabIndex];
            renderTabs();
            messagesArea.innerHTML = '';
            if (currentChat.type === "global") {
                globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.userId === currentUser?.uid));
            } else {
                const msgs = privateMessages.get(currentChat.id) || [];
                msgs.forEach(msg => addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.fromId === currentUser?.uid));
                startPrivateListener(currentChat.id);
            }
        } else if (activeTabIndex > index) {
            activeTabIndex--;
            renderTabs();
        } else {
            renderTabs();
        }
    }
    
    function openPrivateChat(targetId, targetName, targetUniqueId) {
        const existing = openTabs.findIndex(t => t.type === "private" && t.id === targetId);
        if (existing !== -1) {
            switchTab(existing);
            return;
        }
        openTabs.push({ type: "private", id: targetId, name: `${targetName} ${targetUniqueId}` });
        saveTabs();
        renderTabs();
        switchTab(openTabs.length - 1);
    }
    
    // Глобальный чат
    function startGlobalListener() {
        if (globalListener) return;
        const globalQuery = query(ref(db, "global_messages"), limitToLast(100));
        globalListener = onChildAdded(globalQuery, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (globalMessageIds.has(msgId)) return;
            globalMessageIds.add(msgId);
            
            globalMessages.push({
                id: msgId,
                username: data.username,
                uniqueId: data.uniqueId || "",
                text: data.text,
                timestamp: data.timestamp,
                userId: data.userId
            });
            globalMessages.sort((a, b) => a.timestamp - b.timestamp);
            
            if (currentChat.type === "global") {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.userId === currentUser?.uid);
                });
            }
        });
    }
    
    // Личный чат (история)
    function startPrivateListener(targetId) {
        if (privateListeners.has(targetId)) return;
        
        const chatId = [currentUser?.uid, targetId].sort().join('_');
        const chatRef = ref(db, `private_messages/${chatId}`);
        const chatQuery = query(chatRef, limitToLast(100));
        
        if (!privateMessageIds.has(targetId)) {
            privateMessageIds.set(targetId, new Set());
        }
        const msgIds = privateMessageIds.get(targetId);
        
        const callback = (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (msgIds.has(msgId)) return;
            msgIds.add(msgId);
            
            let msgs = privateMessages.get(targetId) || [];
            msgs.push({
                id: msgId,
                username: data.username,
                uniqueId: data.uniqueId || "",
                text: data.text,
                timestamp: data.timestamp,
                fromId: data.fromId,
                toId: data.toId
            });
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            privateMessages.set(targetId, msgs);
            
            if (currentChat.type === "private" && currentChat.id === targetId) {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.fromId === currentUser?.uid);
                });
                updateLastRead(targetId);
                renderTabs();
            }
        };
        
        onChildAdded(chatQuery, callback);
        privateListeners.set(targetId, { ref: chatQuery, callback });
    }
    
    // Глобальный слушатель для новых личных сообщений
    function startGlobalPrivateListener() {
        if (globalPrivateListener) return;
        
        const privateMessagesRef = ref(db, "private_messages");
        
        globalPrivateListener = onChildAdded(privateMessagesRef, (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.text) return;
            
            if (data.toId === currentUser?.uid && data.fromId !== currentUser?.uid) {
                const senderId = data.fromId;
                const senderName = data.username;
                const senderUniqueId = data.uniqueId || "";
                const msgTime = data.timestamp;
                const msgId = snapshot.key;
                
                // Добавляем в кэш
                if (!privateMessages.has(senderId)) {
                    privateMessages.set(senderId, []);
                    privateMessageIds.set(senderId, new Set());
                }
                
                const msgs = privateMessages.get(senderId);
                const msgIdsSet = privateMessageIds.get(senderId);
                
                if (!msgIdsSet.has(msgId)) {
                    msgIdsSet.add(msgId);
                    msgs.push({
                        id: msgId,
                        username: data.username,
                        uniqueId: data.uniqueId || "",
                        text: data.text,
                        timestamp: data.timestamp,
                        fromId: data.fromId,
                        toId: data.toId
                    });
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    privateMessages.set(senderId, msgs);
                }
                
                const isTabOpen = openTabs.some(tab => tab.type === "private" && tab.id === senderId);
                const isActive = (currentChat.type === "private" && currentChat.id === senderId);
                const lastRead = lastReadTime.get(senderId) || 0;
                const isNew = msgTime > lastRead;
                
                if (!isTabOpen) {
                    openTabs.push({ type: "private", id: senderId, name: `${senderName} ${senderUniqueId}` });
                    saveTabs();
                    renderTabs();
                    showToast(`💬 Новое сообщение от ${senderName} ${senderUniqueId}`);
                    
                    if (currentChat.type === "global") {
                        const sysDiv = document.createElement("div");
                        sysDiv.className = "system";
                        sysDiv.style.background = "#2a5a2a";
                        sysDiv.style.color = "#ffaa33";
                        sysDiv.style.border = "1px solid #ffaa33";
                        sysDiv.style.padding = "0.5rem";
                        sysDiv.innerHTML = `✨ НОВОЕ ЛИЧНОЕ СООБЩЕНИЕ от ${escapeHtml(senderName)} ${escapeHtml(senderUniqueId)}! Нажмите на вкладку чтобы прочитать.`;
                        messagesArea.appendChild(sysDiv);
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                        setTimeout(() => sysDiv.remove(), 8000);
                    }
                } else if (!isActive && isNew) {
                    renderTabs();
                    showToast(`💬 Новое сообщение от ${senderName} ${senderUniqueId}`);
                }
            }
        });
    }
    
    // Отправка сообщения
    let lastSend = 0;
    function sendMessage() {
        if (!userData) {
            showToast("Загрузка данных пользователя...");
            return;
        }
        
        const text = messageInput.value.trim();
        if (!text) return;
        if (Date.now() - lastSend < 500) {
            showToast("Подождите");
            return;
        }
        lastSend = Date.now();
        
        console.log("📤 Отправка сообщения от:", userData.username, userData.uniqueId);
        
        if (currentChat.type === "global") {
            push(ref(db, "global_messages"), {
                username: userData.username,
                uniqueId: userData.uniqueId,
                text: text,
                timestamp: Date.now(),
                userId: currentUser.uid
            }).catch(err => console.error("Ошибка отправки:", err));
        } else {
            const chatId = [currentUser.uid, currentChat.id].sort().join('_');
            push(ref(db, `private_messages/${chatId}`), {
                username: userData.username,
                uniqueId: userData.uniqueId,
                text: text,
                timestamp: Date.now(),
                fromId: currentUser.uid,
                toId: currentChat.id
            }).catch(err => console.error("Ошибка отправки:", err));
            updateLastRead(currentChat.id);
        }
        messageInput.value = "";
        messageInput.focus();
    }
    
    // Статус пользователя
    function updateStatus() {
        if (!currentUser || !userData) return;
        set(ref(db, `users/${currentUser.uid}`), {
            email: userData.email || "",
            username: userData.username,
            uniqueId: userData.uniqueId,
            lastSeen: Date.now(),
            online: true
        }).catch(err => console.error(err));
    }
    
    // Список пользователей
    function renderUsersList() {
        const term = searchInput.value.toLowerCase();
        const users = Array.from(allUsers.entries())
            .filter(([id, u]) => u.name.toLowerCase().includes(term))
            .sort((a, b) => (b[1].online ? 1 : 0) - (a[1].online ? 1 : 0));
        
        if (users.length === 0) {
            usersListDiv.innerHTML = '<div class="system" style="margin:1rem;">◼ Нет пользователей</div>';
            return;
        }
        
        usersListDiv.innerHTML = users.map(([id, u]) => `
            <div class="user-item" data-id="${id}" data-name="${u.name}" data-uniqueid="${u.uniqueId}">
                <div>
                    <span class="user-name">${escapeHtml(u.name)}</span>
                    <span class="user-id">${escapeHtml(u.uniqueId)}</span>
                </div>
                <div class="user-status ${u.online ? 'status-online' : 'status-offline'}"></div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => {
                openPrivateChat(el.dataset.id, el.dataset.name, el.dataset.uniqueid);
            });
        });
    }
    
    onValue(ref(db, "users"), (snapshot) => {
        const data = snapshot.val();
        allUsers.clear();
        if (data) {
            const now = Date.now();
            for (let id in data) {
                if (id !== currentUser?.uid) {
                    const online = (now - (data[id].lastSeen || 0) < 120000);
                    allUsers.set(id, { name: data[id].username, uniqueId: data[id].uniqueId, online });
                }
            }
        }
        renderUsersList();
    });
    
    searchInput.addEventListener("input", renderUsersList);
    
    // Инициализация после авторизации
    async function initChat() {
        if (!currentUser) return;
        
        console.log("🔐 Пользователь авторизован:", currentUser.email);
        
        const userDataFromDb = await getUserData(currentUser.uid);
        if (userDataFromDb) {
            userData = userDataFromDb;
            userNicknameSpan.textContent = userData.username;
            userIdDisplaySpan.textContent = userData.uniqueId;
            console.log("✅ Данные загружены:", userData);
        } else {
            console.error("❌ Данные пользователя не найдены!");
            // Создаем данные если их нет
            const uniqueId = await getUniqueUserId();
            const defaultName = currentUser.email.split('@')[0];
            userData = {
                username: defaultName,
                uniqueId: uniqueId,
                email: currentUser.email
            };
            await saveUserData(currentUser.uid, currentUser.email, defaultName, uniqueId);
            userNicknameSpan.textContent = defaultName;
            userIdDisplaySpan.textContent = uniqueId;
        }
        
        chatContainer.style.display = "flex";
        loadTabs();
        loadLastRead();
        startGlobalListener();
        startGlobalPrivateListener();
        updateStatus();
        setInterval(updateStatus, 30000);
        renderTabs();
        
        setTimeout(() => {
            openTabs.forEach(tab => {
                if (tab.type === "private") {
                    startPrivateListener(tab.id);
                }
            });
        }, 1000);
    }
    
    // Auth state listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            initChat();
        } else {
            chatContainer.style.display = "none";
            showAuthModal();
        }
    });
    
    // Обработчики кнопок
    editNameBtn.addEventListener("click", async () => {
        const newName = prompt("Введите ваше имя:", userData?.username);
        if (newName && newName.trim()) {
            await updateUsername(newName.trim().slice(0, 24));
        }
    });
    
    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        location.reload();
    });
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("Ссылка скопирована");
    });
    
    window.addEventListener("beforeunload", () => {
        if (currentUser && userData) {
            set(ref(db, `users/${currentUser.uid}`), {
                ...userData,
                lastSeen: Date.now(),
                online: false
            });
        }
    });
    
    console.log("🚀 Чат с регистрацией запущен!");
    console.log("📝 Формат ID: 6 цифр + буква (например: 123456A)");
</script>
</body>
