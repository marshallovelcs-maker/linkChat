<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fembo — Тест</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 1000px;
            width: 100%;
            height: 90vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #000;
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 24px; }
        h1 { font-size: 1.5rem; color: #fff; }
        .copy-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
        .info {
            background: #111;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.8rem;
            color: #88ff88;
        }
        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 1rem;
            gap: 0.5rem;
            overflow-x: auto;
        }
        .tab {
            padding: 0.7rem 1.2rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            position: relative;
        }
        .tab.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #4a4a4a;
            margin-bottom: -1px;
        }
        .tab.blinking {
            animation: blink 0.6s infinite;
            background: #2a5a2a;
            color: #fff;
        }
        @keyframes blink {
            0%,100% { background: #2a5a2a; }
            50% { background: #ffaa33; color: #000; }
        }
        .close-tab { margin-left: 8px; color: #888; cursor: pointer; }
        .unread-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 10px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #0f0f0f;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }
        .message.own { align-self: flex-end; }
        .bubble {
            background: #1e1e1e;
            padding: 0.6rem 1rem;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
        }
        .message.own .bubble { background: #2a2a2a; border-color: #3a3a3a; }
        .sender {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.2rem;
        }
        .system {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            background: #111;
            padding: 0.3rem;
            margin: 0.2rem auto;
            width: fit-content;
            border: 1px solid #222;
        }
        .input-area {
            background: #0a0a0a;
            padding: 1rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.5rem;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            background: #111;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
        }
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.7rem 0.5rem;
            color: #e0e0e0;
            outline: none;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.5rem 1.2rem;
            color: #e0e0e0;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a2a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 0.5rem 1rem;
            z-index: 999;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <div class="brand"><div class="logo">🦊</div><h1>Fembo</h1></div>
        <button class="copy-btn" id="copyLinkBtn">⎘ Поделиться</button>
    </div>
    <div class="info" id="infoStatus">🟡 Подключение к Firebase...</div>
    <div class="tabs" id="tabsContainer"><div class="tab active"># Общий чат</div></div>
    <div class="messages-area" id="messagesArea"><div class="system">◼ Загрузка...</div></div>
    <div class="input-area">
        <div class="input-wrapper"><input type="text" id="messageInput" placeholder="Напишите сообщение..."></div>
        <button id="sendBtn">◼ Отправить</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, remove, off } from "firebase/database";

    // Firebase конфигурация
    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    console.log("🚀 Инициализация Firebase...");
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    console.log("✅ Firebase инициализирован");

    // DOM элементы
    const infoDiv = document.getElementById("infoStatus");
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const copyBtn = document.getElementById("copyLinkBtn");
    const tabsContainer = document.getElementById("tabsContainer");
    
    // ID пользователя
    let userId = localStorage.getItem("fembo_id");
    if (!userId) {
        userId = "u_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("fembo_id", userId);
    }
    let username = localStorage.getItem("fembo_name") || "Гость_" + Math.floor(Math.random() * 1000);
    
    // Состояние
    let currentChat = { type: "global", id: null };
    let openTabs = [{ type: "global", id: null, name: "Общий чат" }];
    let activeTabIndex = 0;
    let globalMessages = [];
    let globalMessageIds = new Set();
    let privateMessages = new Map();
    let privateMessageIds = new Map();
    let unreadCounts = new Map();
    
    // Вспомогательные функции
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function showToast(msg) {
        let t = document.querySelector(".toast");
        if (t) t.remove();
        const d = document.createElement("div");
        d.className = "toast";
        d.innerHTML = `📩 ${escapeHtml(msg)}`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }
    
    function addMessageToDOM(name, text, ts, isOwn) {
        const div = document.createElement("div");
        div.className = `message ${isOwn ? 'own' : ''}`;
        const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="sender">
                <span>${escapeHtml(name)}</span>
                <span style="color:#666"> ${time}</span>
            </div>
        `;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function addSystemMessage(text, isError = false) {
        const div = document.createElement("div");
        div.className = "system";
        div.style.borderColor = isError ? "#ff4444" : "#222";
        div.style.color = isError ? "#ff8888" : "#888";
        div.innerHTML = isError ? `⚠️ ${escapeHtml(text)}` : `◼ ${escapeHtml(text)}`;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = openTabs.map((tab, idx) => {
            const unread = tab.type === "private" ? (unreadCounts.get(tab.id) || 0) : 0;
            const isBlinking = unread > 0 && idx !== activeTabIndex;
            return `
                <div class="tab ${idx === activeTabIndex ? 'active' : ''} ${isBlinking ? 'blinking' : ''}" data-index="${idx}">
                    ${tab.type === "global" ? "# " : "💬 "}${escapeHtml(tab.name)}
                    ${unread > 0 && idx !== activeTabIndex ? `<span class="unread-badge">${unread > 9 ? '9+' : unread}</span>` : ''}
                    ${tab.type !== "global" ? `<span class="close-tab" data-index="${idx}">✕</span>` : ''}
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.tab').forEach(tab => {
            const idx = parseInt(tab.dataset.index);
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(idx);
                } else {
                    switchTab(idx);
                }
            });
        });
    }
    
    function switchTab(index) {
        if (currentChat.type === "private") {
            const l = privateListeners.get(currentChat.id);
            if (l) {
                off(l.ref, 'child_added', l.callback);
                privateListeners.delete(currentChat.id);
            }
        }
        
        activeTabIndex = index;
        currentChat = openTabs[index];
        
        if (currentChat.type === "private") {
            unreadCounts.delete(currentChat.id);
            saveUnread();
        }
        
        renderTabs();
        messagesArea.innerHTML = '';
        
        if (currentChat.type === "global") {
            if (globalMessages.length === 0) {
                addSystemMessage("Нет сообщений. Напишите что-нибудь!");
            } else {
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId);
                });
            }
        } else {
            const msgs = privateMessages.get(currentChat.id) || [];
            if (msgs.length === 0) {
                addSystemMessage("Нет сообщений. Напишите что-нибудь!");
            } else {
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                });
            }
            startPrivateListener(currentChat.id);
        }
    }
    
    function closeTab(index) {
        if (openTabs[index].type === "global") return;
        const tab = openTabs[index];
        const l = privateListeners.get(tab.id);
        if (l) {
            off(l.ref, 'child_added', l.callback);
            privateListeners.delete(tab.id);
        }
        unreadCounts.delete(tab.id);
        saveUnread();
        openTabs.splice(index, 1);
        saveTabs();
        
        if (activeTabIndex === index) {
            activeTabIndex = Math.max(0, openTabs.length - 1);
            currentChat = openTabs[activeTabIndex];
            renderTabs();
            messagesArea.innerHTML = '';
            if (currentChat.type === "global") {
                globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId));
            } else {
                const msgs = privateMessages.get(currentChat.id) || [];
                msgs.forEach(msg => addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId));
                startPrivateListener(currentChat.id);
            }
        } else if (activeTabIndex > index) {
            activeTabIndex--;
            renderTabs();
        } else {
            renderTabs();
        }
    }
    
    function openPrivateChat(targetId, targetName) {
        const existing = openTabs.findIndex(t => t.type === "private" && t.id === targetId);
        if (existing !== -1) {
            switchTab(existing);
            return;
        }
        openTabs.push({ type: "private", id: targetId, name: targetName });
        saveTabs();
        renderTabs();
        switchTab(openTabs.length - 1);
    }
    
    function saveTabs() {
        const tabs = openTabs.filter(t => t.type === "private").map(t => ({ id: t.id, name: t.name }));
        localStorage.setItem("fembo_tabs", JSON.stringify(tabs));
    }
    
    function loadTabs() {
        try {
            const saved = localStorage.getItem("fembo_tabs");
            if (saved) {
                const tabs = JSON.parse(saved);
                openTabs = [{ type: "global", id: null, name: "Общий чат" }];
                tabs.forEach(t => openTabs.push({ type: "private", id: t.id, name: t.name }));
            }
        } catch(e) {}
    }
    
    function saveUnread() {
        const obj = {};
        unreadCounts.forEach((v, k) => obj[k] = v);
        localStorage.setItem("fembo_unread", JSON.stringify(obj));
    }
    
    function loadUnread() {
        try {
            const saved = localStorage.getItem("fembo_unread");
            if (saved) {
                const obj = JSON.parse(saved);
                unreadCounts.clear();
                Object.entries(obj).forEach(([k, v]) => unreadCounts.set(k, v));
            }
        } catch(e) {}
    }
    
    // Глобальный чат
    let globalListener = null;
    function startGlobalListener() {
        if (globalListener) return;
        infoDiv.innerHTML = "🟢 Подключено к Firebase. Жду сообщения...";
        
        const globalQuery = query(ref(db, "global_messages"), limitToLast(100));
        globalListener = onChildAdded(globalQuery, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (globalMessageIds.has(msgId)) return;
            globalMessageIds.add(msgId);
            
            console.log("📨 Глобальное сообщение:", data.username, data.text);
            
            globalMessages.push({
                id: msgId,
                username: data.username,
                text: data.text,
                timestamp: data.timestamp,
                userId: data.userId
            });
            globalMessages.sort((a, b) => a.timestamp - b.timestamp);
            
            if (currentChat.type === "global") {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId);
                });
            }
        });
    }
    
    // Личные чаты
    let privateListeners = new Map();
    function startPrivateListener(targetId) {
        if (privateListeners.has(targetId)) return;
        
        const chatId = [userId, targetId].sort().join('_');
        const chatRef = ref(db, `private_messages/${chatId}`);
        const chatQuery = query(chatRef, limitToLast(100));
        
        if (!privateMessageIds.has(targetId)) {
            privateMessageIds.set(targetId, new Set());
        }
        const msgIds = privateMessageIds.get(targetId);
        
        const callback = (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (msgIds.has(msgId)) return;
            msgIds.add(msgId);
            
            let msgs = privateMessages.get(targetId) || [];
            msgs.push({
                id: msgId,
                username: data.username,
                text: data.text,
                timestamp: data.timestamp,
                fromId: data.fromId,
                toId: data.toId
            });
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            privateMessages.set(targetId, msgs);
            
            if (currentChat.type === "private" && currentChat.id === targetId) {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                });
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        };
        
        onChildAdded(chatQuery, callback);
        privateListeners.set(targetId, { ref: chatQuery, callback });
    }
    
    // ГЛОБАЛЬНЫЙ СЛУШАТЕЛЬ ДЛЯ ЛИЧНЫХ СООБЩЕНИЙ
    let globalPrivateListener = null;
    function startGlobalPrivateListener() {
        if (globalPrivateListener) return;
        
        console.log("🔔 ЗАПУСК СЛУШАТЕЛЯ ЛИЧНЫХ СООБЩЕНИЙ");
        
        const privateMessagesRef = ref(db, "private_messages");
        
        globalPrivateListener = onChildAdded(privateMessagesRef, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            
            console.log("📨 ЛИЧНОЕ СООБЩЕНИЕ:", data);
            
            if (!data || !data.text) return;
            
            // Проверяем, сообщение для текущего пользователя
            if (data.toId === userId && data.fromId !== userId) {
                const senderId = data.fromId;
                const senderName = data.username;
                
                console.log(`✅ НОВОЕ СООБЩЕНИЕ ДЛЯ ВАС от: ${senderName}`);
                infoDiv.innerHTML = `🔔 Новое сообщение от ${senderName}!`;
                setTimeout(() => {
                    infoDiv.innerHTML = "🟢 Подключено к Firebase";
                }, 3000);
                
                // Добавляем в кэш
                if (!privateMessages.has(senderId)) {
                    privateMessages.set(senderId, []);
                    privateMessageIds.set(senderId, new Set());
                }
                
                const msgs = privateMessages.get(senderId);
                const msgIdsSet = privateMessageIds.get(senderId);
                
                if (!msgIdsSet.has(msgId)) {
                    msgIdsSet.add(msgId);
                    msgs.push({
                        id: msgId,
                        username: data.username,
                        text: data.text,
                        timestamp: data.timestamp,
                        fromId: data.fromId,
                        toId: data.toId
                    });
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    privateMessages.set(senderId, msgs);
                }
                
                // Проверяем открыта ли вкладка
                const isTabOpen = openTabs.some(tab => tab.type === "private" && tab.id === senderId);
                const isActive = (currentChat.type === "private" && currentChat.id === senderId);
                
                if (!isTabOpen) {
                    // СОЗДАЕМ НОВУЮ ВКЛАДКУ
                    console.log(`➕ СОЗДАЮ НОВУЮ ВКЛАДКУ: ${senderName}`);
                    openTabs.push({ type: "private", id: senderId, name: senderName });
                    saveTabs();
                    
                    // Увеличиваем счетчик
                    const current = unreadCounts.get(senderId) || 0;
                    unreadCounts.set(senderId, current + 1);
                    saveUnread();
                    
                    // ОБНОВЛЯЕМ ВКЛАДКИ
                    renderTabs();
                    
                    // ПОКАЗЫВАЕМ УВЕДОМЛЕНИЕ
                    showToast(`💬 Новое сообщение от ${senderName}`);
                    
                    // СИСТЕМНОЕ СООБЩЕНИЕ В ОБЩИЙ ЧАТ
                    if (currentChat.type === "global") {
                        addSystemMessage(`✨ НОВОЕ ЛИЧНОЕ СООБЩЕНИЕ от ${senderName}! Нажмите на вкладку "${senderName}" чтобы прочитать.`);
                    }
                    
                } else if (!isActive) {
                    // Вкладка есть, увеличиваем счетчик
                    console.log(`🔔 УВЕЛИЧИВАЮ СЧЕТЧИК для ${senderName}`);
                    const current = unreadCounts.get(senderId) || 0;
                    unreadCounts.set(senderId, current + 1);
                    saveUnread();
                    renderTabs();
                    showToast(`💬 Новое сообщение от ${senderName}`);
                }
                
                // Если чат активен, обновляем
                if (isActive) {
                    console.log(`🔄 ОБНОВЛЯЮ UI для ${senderName}`);
                    messagesArea.innerHTML = '';
                    msgs.forEach(msg => {
                        addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                    });
                }
            }
        });
        
        console.log("✅ СЛУШАТЕЛЬ ЗАПУЩЕН");
    }
    
    // Отправка сообщения
    let lastSend = 0;
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (Date.now() - lastSend < 500) {
            showToast("Подождите");
            return;
        }
        lastSend = Date.now();
        
        console.log("📤 Отправка сообщения в", currentChat.type);
        
        if (currentChat.type === "global") {
            push(ref(db, "global_messages"), {
                username: username,
                text: text,
                timestamp: Date.now(),
                userId: userId
            }).then(() => {
                console.log("✅ Глобальное сообщение отправлено");
            }).catch(err => {
                console.error("❌ Ошибка отправки:", err);
                addSystemMessage("Ошибка отправки: " + err.message, true);
            });
        } else {
            const chatId = [userId, currentChat.id].sort().join('_');
            push(ref(db, `private_messages/${chatId}`), {
                username: username,
                text: text,
                timestamp: Date.now(),
                fromId: userId,
                toId: currentChat.id
            }).then(() => {
                console.log("✅ Личное сообщение отправлено");
            }).catch(err => {
                console.error("❌ Ошибка отправки:", err);
                addSystemMessage("Ошибка отправки: " + err.message, true);
            });
        }
        
        messageInput.value = "";
        messageInput.focus();
    }
    
    // Статус пользователя
    function updateStatus() {
        set(ref(db, `users/${userId}`), {
            username: username,
            lastSeen: Date.now(),
            online: true
        }).catch(err => console.error("Ошибка статуса:", err));
    }
    
    // Список пользователей
    onValue(ref(db, "users"), (snapshot) => {
        const data = snapshot.val();
        const usersList = document.getElementById("usersList");
        if (!usersList) return;
        
        if (!data) {
            usersList.innerHTML = '<div class="system">◼ Нет пользователей</div>';
            return;
        }
        
        const now = Date.now();
        const users = [];
        for (let id in data) {
            if (id !== userId) {
                const online = (now - (data[id].lastSeen || 0) < 120000);
                users.push({ id, name: data[id].username, online });
            }
        }
        users.sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));
        
        if (users.length === 0) {
            usersList.innerHTML = '<div class="system">◼ Нет других пользователей</div>';
            return;
        }
        
        usersList.innerHTML = users.map(u => `
            <div class="user-item" data-id="${u.id}" data-name="${u.name}" style="display:flex; justify-content:space-between; padding:0.7rem; margin:0.2rem 0; background:#111; border:1px solid #2a2a2a; cursor:pointer;">
                <div style="display:flex; gap:8px;">
                    <span>🦊</span>
                    <span>${escapeHtml(u.name)}</span>
                </div>
                <div style="width:8px; height:8px; border-radius:50%; background:${u.online ? '#2ecc71' : '#7f8c8d'};"></div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => {
                openPrivateChat(el.dataset.id, el.dataset.name);
            });
        });
    });
    
    // Добавляем список пользователей в боковую панель
    const sidebar = document.createElement("div");
    sidebar.style.width = "280px";
    sidebar.style.background = "#000";
    sidebar.style.borderRight = "1px solid #2a2a2a";
    sidebar.style.display = "flex";
    sidebar.style.flexDirection = "column";
    sidebar.style.overflow = "hidden";
    sidebar.innerHTML = `
        <div style="padding:1rem; border-bottom:1px solid #2a2a2a;">
            <h3 style="color:#fff; font-size:0.9rem;">◼ Пользователи</h3>
            <input type="text" id="searchUsers" style="width:100%; background:#111; border:1px solid #2a2a2a; padding:0.6rem; color:#e0e0e0; margin-top:0.5rem;" placeholder="Поиск...">
        </div>
        <div id="usersList" style="flex:1; overflow-y:auto; padding:0.5rem;"></div>
    `;
    document.querySelector(".chat-container").insertBefore(sidebar, document.querySelector(".chat-container").firstChild);
    
    // Поиск
    const searchUsersInput = document.getElementById("searchUsers");
    if (searchUsersInput) {
        searchUsersInput.addEventListener("input", () => {
            const ev = new Event('value');
            document.dispatchEvent(ev);
        });
    }
    
    // Инициализация
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("Ссылка скопирована");
    });
    
    loadTabs();
    loadUnread();
    startGlobalListener();
    startGlobalPrivateListener();
    updateStatus();
    setInterval(updateStatus, 30000);
    
    window.addEventListener("beforeunload", () => {
        set(ref(db, `users/${userId}`), { username, lastSeen: Date.now(), online: false });
    });
    
    setTimeout(() => {
        if (username.startsWith("Гость_")) {
            const newName = prompt("Введите ваше имя:", username);
            if (newName && newName.trim()) {
                username = newName.trim().slice(0, 24);
                localStorage.setItem("fembo_name", username);
                updateStatus();
            }
        }
    }, 500);
    
    renderTabs();
    
    setTimeout(() => {
        openTabs.forEach(tab => {
            if (tab.type === "private") {
                startPrivateListener(tab.id);
            }
        });
    }, 1000);
    
    console.log("🚀 ЧАТ ЗАПУЩЕН!");
    console.log("👤 Ваш ID:", userId);
    console.log("📝 Ваше имя:", username);
    console.log("💡 Откройте другую вкладку браузера и отправьте сообщение");
</script>
</body>
</html>
