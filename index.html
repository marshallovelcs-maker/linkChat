<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fembo — Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 1200px;
            width: 100%;
            height: 90vh;
            background: #0a0a0a;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #000;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .sidebar-header h3 { color: #fff; font-size: 0.9rem; }
        .search-box {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.6rem;
            color: #e0e0e0;
            margin-top: 0.5rem;
            outline: none;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .global-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.7rem;
            margin: 0.2rem 0 0.5rem 0;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            cursor: pointer;
            color: #e0e0e0;
        }
        .global-chat-btn:hover { background: #2a2a2a; }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem;
            margin: 0.2rem 0;
            background: #111;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .user-item:hover { background: #1a1a1a; }
        .user-item.unread-highlight {
            background: #3a6a3a;
            border-color: #ffaa33;
            animation: blinkBg 1s ease-in-out infinite;
        }
        @keyframes blinkBg {
            0%, 100% { background: #3a6a3a; }
            50% { background: #ffaa33; }
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .user-avatar { font-size: 1.2rem; }
        .user-name { color: #e0e0e0; font-size: 0.85rem; }
        .user-id { color: #888; font-size: 0.7rem; font-family: monospace; margin-left: 0.5rem; }
        .unread-badge {
            background: #ff4444;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 22px;
            text-align: center;
            animation: pulseBadge 1s infinite;
        }
        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .user-status { width: 8px; height: 8px; border-radius: 50%; }
        .status-online { background: #2ecc71; }
        .status-offline { background: #7f8c8d; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            background: #000;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 24px; }
        h1 { font-size: 1.2rem; color: #fff; }
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #3a3a3a;
        }
        .user-info-header span:first-child { color: #888; font-size: 0.7rem; }
        .user-info-header .nickname { color: #ffaa66; font-weight: 600; font-size: 0.8rem; }
        .user-info-header .user-id-display { color: #666; font-size: 0.7rem; font-family: monospace; }
        .edit-name-btn {
            background: #2a2a2a;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }
        .logout-btn {
            background: #2a2a2a;
            border: 1px solid #5a3a3a;
            color: #ff8888;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        .copy-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .current-chat-title {
            padding: 0.5rem 1rem;
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            color: #fff;
            font-size: 0.9rem;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            background: #0f0f0f;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }
        .message.own { align-self: flex-end; }
        .message.unread {
            animation: highlight 0.5s ease-out;
            border-left: 3px solid #ffaa33;
            padding-left: 8px;
        }
        @keyframes highlight {
            0% { background: rgba(255, 170, 51, 0.3); }
            100% { background: transparent; }
        }
        .bubble {
            background: #1e1e1e;
            padding: 0.6rem 1rem;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }
        .message.own .bubble { background: #2a2a2a; }
        .sender {
            font-size: 0.65rem;
            color: #888;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .message.own .sender { justify-content: flex-end; }
        .sender-name { font-weight: 600; color: #aaa; }
        .sender-id { color: #666; font-family: monospace; }
        .message-time { color: #666; }
        .system {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            background: #111;
            padding: 0.3rem;
            margin: 0.2rem auto;
            width: fit-content;
            border: 1px solid #222;
            border-radius: 4px;
        }
        .input-area {
            background: #0a0a0a;
            padding: 0.8rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.5rem;
        }
        .input-wrapper {
            flex: 1;
            background: #111;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }
        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 0.6rem 0.3rem;
            color: #e0e0e0;
            outline: none;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.5rem 1rem;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 6px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a2a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            z-index: 1000;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-modal {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }
        .auth-modal h2 { color: #fff; margin-bottom: 1.5rem; font-size: 1.2rem; }
        .auth-input {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.8rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .auth-switch { text-align: center; color: #888; font-size: 0.85rem; cursor: pointer; }
        .auth-switch span { color: #ffaa66; text-decoration: underline; }
        .auth-error { color: #ff8888; font-size: 0.8rem; text-align: center; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="chat-container" id="chatContainer" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>◼ Пользователи</h3>
            <input type="text" id="searchUsers" class="search-box" placeholder="Поиск...">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    <div class="main-area">
        <div class="chat-header">
            <div class="brand"><div class="logo">🦊</div><h1>Fembo</h1></div>
            <div class="user-info-header">
                <span>👤</span>
                <span class="nickname" id="userNickname"></span>
                <span class="user-id-display" id="userIdDisplay"></span>
                <button class="edit-name-btn" id="editNameBtn">✎</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                <button class="copy-btn" id="copyBtn">⎘</button>
            </div>
        </div>
        <div class="current-chat-title" id="currentChatTitle"># Общий чат</div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-wrapper"><input type="text" id="messageInput" placeholder="Напишите сообщение..."></div>
            <button id="sendBtn">◼ Отправить</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, off, get } from "firebase/database";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // DOM
    const chatContainer = document.getElementById("chatContainer");
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const copyBtn = document.getElementById("copyBtn");
    const usersListDiv = document.getElementById("usersList");
    const searchInput = document.getElementById("searchUsers");
    const userNicknameSpan = document.getElementById("userNickname");
    const userIdDisplaySpan = document.getElementById("userIdDisplay");
    const editNameBtn = document.getElementById("editNameBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const currentChatTitle = document.getElementById("currentChatTitle");
    
    // Глобальные переменные
    let currentUser = null;
    let myUsername = "";
    let myUniqueId = "";
    let currentChatId = null;
    let allUsers = new Map();
    let globalMessages = [];
    let globalMessageIds = new Set();
    let privateMessages = new Map();
    let privateMessageIds = new Map();
    let unreadCounts = new Map();
    let globalListener = null;
    let privateListeners = new Map();
    let processedMsgIds = new Set();
    let lastMessageTime = Date.now();
    
    // Генерация ID
    function generateUniqueId() {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const randomLetter = letters[Math.floor(Math.random() * letters.length)];
        const randomNumbers = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        return `${randomNumbers}${randomLetter}`;
    }
    
    async function saveUserToDatabase(userId, email, username, uniqueId) {
        await set(ref(db, `users/${userId}`), {
            email: email,
            username: username,
            uniqueId: uniqueId,
            lastSeen: Date.now(),
            online: true
        });
    }
    
    async function loadUserData(userId) {
        const snapshot = await get(ref(db, `users/${userId}`));
        return snapshot.val();
    }
    
    async function getUniqueUserId() {
        let uniqueId;
        let isUnique = false;
        let attempts = 0;
        while (!isUnique && attempts < 50) {
            uniqueId = generateUniqueId();
            const idRef = ref(db, `unique_ids/${uniqueId}`);
            const snapshot = await get(idRef);
            if (!snapshot.exists()) {
                isUnique = true;
                await set(idRef, { taken: true, userId: auth.currentUser?.uid });
            }
            attempts++;
        }
        return uniqueId;
    }
    
    // ЯРКОЕ УВЕДОМЛЕНИЕ - гарантированно видно!
    function showNotification(msg) {
        // Всплывающее уведомление
        let toast = document.querySelector(".toast");
        if (toast) toast.remove();
        const d = document.createElement("div");
        d.className = "toast";
        d.innerHTML = `📩 ${escapeHtml(msg)}`;
        document.body.appendChild(d);
        
        // Мигание заголовка вкладки
        const originalTitle = document.title;
        let count = 0;
        const interval = setInterval(() => {
            document.title = count % 2 === 0 ? "🔔 НОВОЕ СООБЩЕНИЕ! 🔔" : originalTitle;
            count++;
            if (count > 10) {
                clearInterval(interval);
                document.title = originalTitle;
            }
        }, 500);
        
        // Звук
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.2;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
        } catch(e) { console.log("Звук не поддерживается"); }
        
        // Автоматическое исчезновение через 4 секунды
        setTimeout(() => {
            if (d.parentNode) d.remove();
        }, 4000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function addMessageToDOM(name, uniqueId, text, ts, isOwn, isUnread = false) {
        const div = document.createElement("div");
        div.className = `message ${isOwn ? 'own' : ''} ${isUnread ? 'unread' : ''}`;
        const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="sender">
                <span class="sender-name">${escapeHtml(name)}</span>
                <span class="sender-id">${escapeHtml(uniqueId)}</span>
                <span class="message-time">${time}</span>
            </div>
        `;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        if (isUnread) setTimeout(() => div.classList.remove('unread'), 2000);
    }
    
    function renderUsersList() {
        const term = searchInput.value.toLowerCase();
        const users = Array.from(allUsers.entries())
            .filter(([id, u]) => u.name.toLowerCase().includes(term))
            .sort((a, b) => (b[1].online ? 1 : 0) - (a[1].online ? 1 : 0));
        
        let html = `
            <div class="global-chat-btn" id="globalChatBtn">
                <span class="avatar">🌍</span>
                <span>Общий чат</span>
            </div>
        `;
        
        if (users.length === 0) {
            html += '<div class="system" style="margin:1rem;">◼ Нет пользователей</div>';
        } else {
            html += users.map(([id, u]) => {
                const unreadCount = unreadCounts.get(id) || 0;
                const hasUnread = unreadCount > 0;
                return `
                    <div class="user-item ${hasUnread ? 'unread-highlight' : ''}" data-id="${id}" data-name="${u.name}" data-uniqueid="${u.uniqueId}">
                        <div class="user-info">
                            <span class="user-avatar">🦊</span>
                            <span class="user-name">${escapeHtml(u.name)}</span>
                            <span class="user-id">${escapeHtml(u.uniqueId)}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            ${hasUnread ? `<span class="unread-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}
                            <div class="user-status ${u.online ? 'status-online' : 'status-offline'}"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        usersListDiv.innerHTML = html;
        
        document.getElementById("globalChatBtn")?.addEventListener("click", () => openGlobalChat());
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => {
                const targetId = el.dataset.id;
                const targetName = el.dataset.name;
                const targetUniqueId = el.dataset.uniqueid;
                openPrivateChat(targetId, targetName, targetUniqueId);
            });
        });
    }
    
    function openPrivateChat(targetId, targetName, targetUniqueId) {
        currentChatId = targetId;
        currentChatTitle.textContent = `💬 ${targetName} ${targetUniqueId}`;
        
        if (unreadCounts.has(targetId)) {
            unreadCounts.delete(targetId);
            renderUsersList();
        }
        
        const msgs = privateMessages.get(targetId) || [];
        if (msgs.length === 0) {
            messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
        } else {
            messagesArea.innerHTML = '';
            msgs.forEach(msg => {
                addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.fromId === currentUser?.uid, false);
            });
        }
        startPrivateListener(targetId);
    }
    
    function openGlobalChat() {
        currentChatId = null;
        currentChatTitle.textContent = "# Общий чат";
        if (globalMessages.length === 0) {
            messagesArea.innerHTML = '<div class="system">◼ Нет сообщений</div>';
        } else {
            messagesArea.innerHTML = '';
            globalMessages.forEach(msg => {
                addMessageToDOM(msg.username, msg.uniqueId || "", msg.text, msg.timestamp, msg.userId === currentUser?.uid, false);
            });
        }
    }
    
    function startGlobalListener() {
        if (globalListener) return;
        const globalQuery = query(ref(db, "global_messages"), limitToLast(100));
        globalListener = onChildAdded(globalQuery, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (globalMessageIds.has(msgId)) return;
            globalMessageIds.add(msgId);
            globalMessages.push({ id: msgId, username: data.username, uniqueId: data.uniqueId || "", text: data.text, timestamp: data.timestamp, userId: data.userId });
            globalMessages.sort((a, b) => a.timestamp - b.timestamp);
            if (currentChatId === null) {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.userId === currentUser?.uid, false);
                });
            }
        });
    }
    
    function startPrivateListener(targetId) {
        if (privateListeners.has(targetId)) return;
        const chatId = [currentUser?.uid, targetId].sort().join('_');
        const chatRef = ref(db, `private_messages/${chatId}`);
        const chatQuery = query(chatRef, limitToLast(100));
        if (!privateMessageIds.has(targetId)) privateMessageIds.set(targetId, new Set());
        const msgIds = privateMessageIds.get(targetId);
        const callback = (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (msgIds.has(msgId)) return;
            msgIds.add(msgId);
            let msgs = privateMessages.get(targetId) || [];
            msgs.push({ id: msgId, username: data.username, uniqueId: data.uniqueId || "", text: data.text, timestamp: data.timestamp, fromId: data.fromId, toId: data.toId });
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            privateMessages.set(targetId, msgs);
            if (currentChatId === targetId) {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.fromId === currentUser?.uid, false);
                });
            }
        };
        onChildAdded(chatQuery, callback);
        privateListeners.set(targetId, { ref: chatQuery, callback });
    }
    
    // Глобальный слушатель для уведомлений
    function setupNotificationListener() {
        console.log("🔔 СЛУШАТЕЛЬ ЗАПУЩЕН");
        
        const privateMessagesRef = ref(db, "private_messages");
        
        onChildAdded(privateMessagesRef, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            const msgTime = data?.timestamp || Date.now();
            
            if (!data || !data.text) return;
            if (msgTime < lastMessageTime - 1000) return;
            if (processedMsgIds.has(msgId)) return;
            processedMsgIds.add(msgId);
            
            console.log(`📨 Сообщение: кому=${data.toId}, от=${data.fromId}, я=${currentUser?.uid}`);
            
            if (currentUser && data.toId === currentUser.uid && data.fromId !== currentUser.uid) {
                const senderId = data.fromId;
                const senderName = data.username;
                const senderUniqueId = data.uniqueId || "";
                
                console.log(`✅ НОВОЕ СООБЩЕНИЕ ОТ: ${senderName}`);
                
                // Добавляем в кэш
                if (!privateMessages.has(senderId)) {
                    privateMessages.set(senderId, []);
                    privateMessageIds.set(senderId, new Set());
                }
                const msgs = privateMessages.get(senderId);
                const msgIdsSet = privateMessageIds.get(senderId);
                if (!msgIdsSet.has(msgId)) {
                    msgIdsSet.add(msgId);
                    msgs.push({
                        id: msgId,
                        username: data.username,
                        uniqueId: data.uniqueId || "",
                        text: data.text,
                        timestamp: data.timestamp,
                        fromId: data.fromId,
                        toId: data.toId
                    });
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    privateMessages.set(senderId, msgs);
                }
                
                // Увеличиваем счетчик
                const current = unreadCounts.get(senderId) || 0;
                unreadCounts.set(senderId, current + 1);
                console.log(`📊 Счетчик для ${senderName}: ${current + 1}`);
                
                // ОБНОВЛЯЕМ СПИСОК ПОЛЬЗОВАТЕЛЕЙ - ДОБАВЛЯЕМ ПОДСВЕТКУ!
                renderUsersList();
                
                // ПОКАЗЫВАЕМ ЯРКОЕ УВЕДОМЛЕНИЕ
                showNotification(`💬 Новое сообщение от ${senderName} ${senderUniqueId}`);
                
                // Если чат уже открыт - показываем сообщение
                if (currentChatId === senderId) {
                    messagesArea.innerHTML = '';
                    msgs.forEach(msg => {
                        addMessageToDOM(msg.username, msg.uniqueId, msg.text, msg.timestamp, msg.fromId === currentUser?.uid, true);
                    });
                    unreadCounts.delete(senderId);
                    renderUsersList();
                }
            }
        });
    }
    
    // Отправка сообщения
    let lastSend = 0;
    function sendMessage() {
        if (!myUsername || !myUniqueId) { alert("Загрузка данных..."); return; }
        const text = messageInput.value.trim();
        if (!text) return;
        if (Date.now() - lastSend < 500) { alert("Подождите"); return; }
        lastSend = Date.now();
        
        if (currentChatId === null) {
            push(ref(db, "global_messages"), {
                username: myUsername,
                uniqueId: myUniqueId,
                text: text,
                timestamp: Date.now(),
                userId: currentUser.uid
            }).catch(err => console.error(err));
        } else {
            const chatId = [currentUser.uid, currentChatId].sort().join('_');
            push(ref(db, `private_messages/${chatId}`), {
                username: myUsername,
                uniqueId: myUniqueId,
                text: text,
                timestamp: Date.now(),
                fromId: currentUser.uid,
                toId: currentChatId
            }).catch(err => console.error(err));
        }
        messageInput.value = "";
        messageInput.focus();
    }
    
    function updateStatus() {
        if (!currentUser) return;
        set(ref(db, `users/${currentUser.uid}`), {
            email: currentUser.email,
            username: myUsername,
            uniqueId: myUniqueId,
            lastSeen: Date.now(),
            online: true
        }).catch(err => console.error(err));
    }
    
    // Auth Modal
    function showAuthModal() {
        const modal = document.createElement("div");
        modal.className = "auth-overlay";
        modal.innerHTML = `
            <div class="auth-modal">
                <h2 id="authTitle">◼ Вход в Fembo</h2>
                <input type="email" id="authEmail" class="auth-input" placeholder="Email">
                <input type="password" id="authPassword" class="auth-input" placeholder="Пароль (мин. 6)">
                <button id="authSubmitBtn" class="auth-btn">Войти</button>
                <div class="auth-switch" id="authSwitch">Нет аккаунта? <span>Зарегистрироваться</span></div>
                <div id="authError" class="auth-error"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let isLogin = true;
        const authTitle = modal.querySelector("#authTitle");
        const authSubmitBtn = modal.querySelector("#authSubmitBtn");
        const authSwitch = modal.querySelector("#authSwitch");
        const authError = modal.querySelector("#authError");
        const emailInput = modal.querySelector("#authEmail");
        const passwordInput = modal.querySelector("#authPassword");
        
        function updateForm() {
            if (isLogin) {
                authTitle.textContent = "◼ Вход в Fembo";
                authSubmitBtn.textContent = "Войти";
                authSwitch.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
            } else {
                authTitle.textContent = "◼ Регистрация в Fembo";
                authSubmitBtn.textContent = "Зарегистрироваться";
                authSwitch.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            }
            authError.textContent = "";
        }
        
        authSwitch.addEventListener("click", () => { isLogin = !isLogin; updateForm(); });
        
        authSubmitBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) { authError.textContent = "Заполните все поля"; return; }
            if (!isLogin && password.length < 6) { authError.textContent = "Пароль должен быть не менее 6 символов"; return; }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const uniqueId = await getUniqueUserId();
                    const defaultName = email.split('@')[0];
                    await saveUserToDatabase(userCredential.user.uid, email, defaultName, uniqueId);
                }
                modal.remove();
            } catch (error) {
                let errorMessage = "Ошибка: ";
                switch (error.code) {
                    case "auth/email-already-in-use": errorMessage += "Email уже используется"; break;
                    case "auth/invalid-email": errorMessage += "Некорректный email"; break;
                    case "auth/user-not-found": errorMessage += "Пользователь не найден"; break;
                    case "auth/wrong-password": errorMessage += "Неверный пароль"; break;
                    default: errorMessage += error.message;
                }
                authError.textContent = errorMessage;
            }
        });
        
        emailInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
        passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") authSubmitBtn.click(); });
    }
    
    // Инициализация
    async function initChat(user) {
        currentUser = user;
        const userData = await loadUserData(user.uid);
        
        if (userData && userData.username && userData.uniqueId) {
            myUsername = userData.username;
            myUniqueId = userData.uniqueId;
        } else {
            myUsername = user.email.split('@')[0];
            myUniqueId = generateUniqueId();
            await saveUserToDatabase(user.uid, user.email, myUsername, myUniqueId);
            await set(ref(db, `unique_ids/${myUniqueId}`), { taken: true, userId: user.uid });
        }
        
        userNicknameSpan.textContent = myUsername;
        userIdDisplaySpan.textContent = myUniqueId;
        chatContainer.style.display = "flex";
        
        lastMessageTime = Date.now();
        
        startGlobalListener();
        setupNotificationListener();
        updateStatus();
        setInterval(updateStatus, 30000);
        
        openGlobalChat();
        
        console.log("🚀 ЧАТ ЗАПУЩЕН!");
    }
    
    onValue(ref(db, "users"), (snapshot) => {
        const data = snapshot.val();
        allUsers.clear();
        if (data) {
            const now = Date.now();
            for (let id in data) {
                if (id !== currentUser?.uid) {
                    const online = (now - (data[id].lastSeen || 0) < 120000);
                    allUsers.set(id, { name: data[id].username, uniqueId: data[id].uniqueId, online });
                }
            }
        }
        renderUsersList();
    });
    
    searchInput.addEventListener("input", renderUsersList);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            initChat(user);
        } else {
            chatContainer.style.display = "none";
            showAuthModal();
        }
    });
    
    editNameBtn.addEventListener("click", async () => {
        const newName = prompt("Введите ваше имя:", myUsername);
        if (newName && newName.trim()) {
            myUsername = newName.trim().slice(0, 24);
            await set(ref(db, `users/${currentUser.uid}/username`), myUsername);
            userNicknameSpan.textContent = myUsername;
            updateStatus();
            alert(`Имя изменено на ${myUsername}`);
        }
    });
    
    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        location.reload();
    });
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        alert("Ссылка скопирована");
    });
    
    window.addEventListener("beforeunload", () => {
        if (currentUser) {
            set(ref(db, `users/${currentUser.uid}`), { email: currentUser.email, username: myUsername, uniqueId: myUniqueId, lastSeen: Date.now(), online: false });
        }
    });
</script>
</body>
</html>
