<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fembo — Тест уведомлений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 1200px;
            width: 100%;
            height: 90vh;
            background: #0a0a0a;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #000000;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .sidebar-header h3 { color: #fff; font-size: 0.9rem; margin-bottom: 0.8rem; }
        .search-box {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 0.6rem;
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem;
            margin: 0.2rem 0;
            background: #111;
            border: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .user-item:hover { background: #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .user-avatar { font-size: 1.2rem; }
        .user-name { color: #e0e0e0; font-size: 0.85rem; }
        .user-status { width: 8px; height: 8px; border-radius: 50%; }
        .status-online { background: #2ecc71; }
        .status-offline { background: #7f8c8d; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header {
            background: #000;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 24px; }
        .brand h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
        .copy-link-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            font-size: 0.85rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 1rem;
            gap: 0.5rem;
            overflow-x: auto;
            min-height: 48px;
        }
        .tab {
            padding: 0.7rem 1.2rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            position: relative;
        }
        .tab.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #4a4a4a;
            border-bottom-color: #1a1a1a;
            margin-bottom: -1px;
        }
        .tab.blinking { animation: blink 0.6s infinite; background: #2a5a2a; color: #fff; }
        @keyframes blink { 0%,100% { background: #2a5a2a; } 50% { background: #ffaa33; color: #000; } }
        .close-tab { margin-left: 8px; color: #888; cursor: pointer; }
        .unread-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 10px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #0f0f0f;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }
        .message.own { align-self: flex-end; margin-left: auto; }
        .message-bubble {
            background: #1e1e1e;
            padding: 0.8rem 1.2rem;
            color: #e0e0e0;
            word-break: break-word;
            font-size: 0.95rem;
            border: 1px solid #2a2a2a;
        }
        .message.own .message-bubble { background: #2a2a2a; border-color: #3a3a3a; color: #fff; }
        .message-sender {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.3rem;
            display: flex;
            gap: 0.5rem;
        }
        .message.own .message-sender { justify-content: flex-end; }
        .sender-name { font-weight: 600; color: #aaa; }
        .message-time { color: #666; }
        .system-message {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            background: #111;
            margin: 0.3rem auto;
            padding: 0.4rem 1rem;
            width: fit-content;
            border: 1px solid #222;
        }
        .input-area {
            background: #0a0a0a;
            padding: 1rem 1.5rem;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 0.75rem;
        }
        .message-input-wrapper {
            flex: 1;
            display: flex;
            background: #111;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #2a2a2a;
        }
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem 0.5rem;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a2a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            z-index: 999;
            border-radius: 8px;
        }
        @media (max-width: 768px) { .sidebar { width: 220px; } .message { max-width: 95%; } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>◼ Пользователи</h3>
            <input type="text" id="searchUsers" class="search-box" placeholder="Поиск...">
        </div>
        <div class="users-list" id="usersList"><div class="system-message">Загрузка...</div></div>
    </div>
    <div class="main-area">
        <div class="chat-header">
            <div class="brand"><div class="logo">🦊</div><h1>Fembo</h1></div>
            <button class="copy-link-btn" id="copyLinkButton">⎘ Поделиться</button>
        </div>
        <div class="tabs" id="tabsContainer"><div class="tab active"># Общий чат</div></div>
        <div class="messages-area" id="messagesArea"><div class="system-message">◼ Загрузка...</div></div>
        <div class="input-area">
            <div class="message-input-wrapper"><input type="text" id="messageInput" placeholder="Напишите сообщение..."></div>
            <button id="sendButton">◼ Отправить</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, onValue, set, off } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyACbUMNMGOQLg-iCDVuceIcld7UJTayYqU",
        authDomain: "chat-f3029.firebaseapp.com",
        databaseURL: "https://chat-f3029-default-rtdb.firebaseio.com",
        projectId: "chat-f3029",
        storageBucket: "chat-f3029.firebasestorage.app",
        messagingSenderId: "150747577754",
        appId: "1:150747577754:web:fcaaa4d96efe1f8ad30e23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // DOM
    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendButton");
    const copyBtn = document.getElementById("copyLinkButton");
    const usersListDiv = document.getElementById("usersList");
    const searchInput = document.getElementById("searchUsers");
    const tabsContainer = document.getElementById("tabsContainer");
    
    // User data
    let userId = localStorage.getItem("fembo_id");
    if (!userId) {
        userId = "u_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("fembo_id", userId);
    }
    let username = localStorage.getItem("fembo_name") || "Гость_" + Math.floor(Math.random() * 1000);
    
    // State
    let currentChat = { type: "global", id: null };
    let openTabs = [{ type: "global", id: null, name: "Общий чат" }];
    let activeTabIndex = 0;
    let users = new Map();
    
    // Message caches
    let globalMessages = [];
    let globalMessageIds = new Set();
    let privateMessages = new Map();
    let privateMessageIds = new Map();
    
    // Unread counts
    let unreadCounts = new Map();
    
    // Save/Load
    function saveTabs() {
        const tabs = openTabs.filter(t => t.type === "private").map(t => ({ id: t.id, name: t.name }));
        localStorage.setItem("fembo_tabs", JSON.stringify(tabs));
    }
    function loadTabs() {
        try {
            const saved = localStorage.getItem("fembo_tabs");
            if (saved) {
                const tabs = JSON.parse(saved);
                openTabs = [{ type: "global", id: null, name: "Общий чат" }];
                tabs.forEach(t => openTabs.push({ type: "private", id: t.id, name: t.name }));
            }
        } catch(e) {}
    }
    
    function loadUnread() {
        try {
            const saved = localStorage.getItem("fembo_unread");
            if (saved) {
                const obj = JSON.parse(saved);
                unreadCounts.clear();
                Object.entries(obj).forEach(([k, v]) => unreadCounts.set(k, v));
            }
        } catch(e) {}
    }
    function saveUnread() {
        const obj = {};
        unreadCounts.forEach((v, k) => obj[k] = v);
        localStorage.setItem("fembo_unread", JSON.stringify(obj));
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    function scrollToBottom() {
        setTimeout(() => messagesArea.scrollTop = messagesArea.scrollHeight, 50);
    }
    function showToast(msg) {
        let t = document.querySelector(".toast-msg");
        if (t) t.remove();
        const d = document.createElement("div");
        d.className = "toast-msg";
        d.innerHTML = `📩 ${escapeHtml(msg)}`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }
    function addMessageToDOM(name, text, ts, isOwn) {
        const div = document.createElement("div");
        div.className = `message ${isOwn ? 'own' : ''}`;
        const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <div class="message-bubble">${escapeHtml(text)}</div>
            <div class="message-sender">
                <span class="sender-name">${escapeHtml(name)}</span>
                <span class="message-time">${time}</span>
            </div>
        `;
        messagesArea.appendChild(div);
        scrollToBottom();
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = openTabs.map((tab, idx) => {
            const unreadCount = tab.type === "private" ? (unreadCounts.get(tab.id) || 0) : 0;
            const isBlinking = unreadCount > 0 && idx !== activeTabIndex;
            return `
                <div class="tab ${idx === activeTabIndex ? 'active' : ''} ${isBlinking ? 'blinking' : ''}" data-index="${idx}">
                    ${tab.type === "global" ? "# " : "💬 "}${escapeHtml(tab.name)}
                    ${unreadCount > 0 && idx !== activeTabIndex ? `<span class="unread-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}
                    ${tab.type !== "global" ? `<span class="close-tab" data-index="${idx}">✕</span>` : ''}
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.tab').forEach(tab => {
            const idx = parseInt(tab.dataset.index);
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(idx);
                } else {
                    switchTab(idx);
                }
            });
        });
    }
    
    function switchTab(index) {
        if (currentChat.type === "private") {
            const l = privateListeners.get(currentChat.id);
            if (l) {
                off(l.ref, 'child_added', l.callback);
                privateListeners.delete(currentChat.id);
            }
        }
        
        activeTabIndex = index;
        currentChat = openTabs[index];
        
        if (currentChat.type === "private") {
            unreadCounts.delete(currentChat.id);
            saveUnread();
        }
        
        renderTabs();
        messagesArea.innerHTML = '<div class="system-message">◼ Загрузка...</div>';
        
        if (currentChat.type === "global") {
            if (globalMessages.length === 0) {
                messagesArea.innerHTML = '<div class="system-message">◼ Нет сообщений</div>';
            } else {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId);
                });
            }
        } else {
            const msgs = privateMessages.get(currentChat.id) || [];
            if (msgs.length === 0) {
                messagesArea.innerHTML = '<div class="system-message">◼ Нет сообщений</div>';
            } else {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                });
            }
            startPrivateListener(currentChat.id);
        }
    }
    
    function closeTab(index) {
        if (openTabs[index].type === "global") return;
        const tab = openTabs[index];
        const l = privateListeners.get(tab.id);
        if (l) {
            off(l.ref, 'child_added', l.callback);
            privateListeners.delete(tab.id);
        }
        unreadCounts.delete(tab.id);
        saveUnread();
        openTabs.splice(index, 1);
        saveTabs();
        
        if (activeTabIndex === index) {
            activeTabIndex = Math.max(0, openTabs.length - 1);
            currentChat = openTabs[activeTabIndex];
            renderTabs();
            if (currentChat.type === "global") {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId));
            } else {
                const msgs = privateMessages.get(currentChat.id) || [];
                messagesArea.innerHTML = '';
                msgs.forEach(msg => addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId));
                startPrivateListener(currentChat.id);
            }
        } else if (activeTabIndex > index) {
            activeTabIndex--;
            renderTabs();
        } else {
            renderTabs();
        }
    }
    
    function openPrivateChat(targetId, targetName) {
        const existing = openTabs.findIndex(t => t.type === "private" && t.id === targetId);
        if (existing !== -1) {
            switchTab(existing);
            return;
        }
        openTabs.push({ type: "private", id: targetId, name: targetName });
        saveTabs();
        renderTabs();
        switchTab(openTabs.length - 1);
    }
    
    // GLOBAL MESSAGES
    let globalListener = null;
    function startGlobalListener() {
        if (globalListener) return;
        const globalQuery = query(ref(db, "global_messages"), limitToLast(100));
        globalListener = onChildAdded(globalQuery, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (globalMessageIds.has(msgId)) return;
            globalMessageIds.add(msgId);
            
            globalMessages.push({
                id: msgId,
                username: data.username,
                text: data.text,
                timestamp: data.timestamp,
                userId: data.userId
            });
            globalMessages.sort((a, b) => a.timestamp - b.timestamp);
            
            if (currentChat.type === "global") {
                messagesArea.innerHTML = '';
                globalMessages.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.userId === userId);
                });
            }
        });
    }
    
    // PRIVATE LISTENERS
    let privateListeners = new Map();
    function startPrivateListener(targetId) {
        if (privateListeners.has(targetId)) return;
        
        const chatId = [userId, targetId].sort().join('_');
        const chatRef = ref(db, `private_messages/${chatId}`);
        const chatQuery = query(chatRef, limitToLast(100));
        
        if (!privateMessageIds.has(targetId)) {
            privateMessageIds.set(targetId, new Set());
        }
        const msgIds = privateMessageIds.get(targetId);
        
        const callback = (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            if (!data || !data.text) return;
            if (msgIds.has(msgId)) return;
            msgIds.add(msgId);
            
            let msgs = privateMessages.get(targetId) || [];
            msgs.push({
                id: msgId,
                username: data.username,
                text: data.text,
                timestamp: data.timestamp,
                fromId: data.fromId,
                toId: data.toId
            });
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            privateMessages.set(targetId, msgs);
            
            if (currentChat.type === "private" && currentChat.id === targetId) {
                messagesArea.innerHTML = '';
                msgs.forEach(msg => {
                    addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                });
                scrollToBottom();
            }
        };
        
        onChildAdded(chatQuery, callback);
        privateListeners.set(targetId, { ref: chatQuery, callback });
    }
    
    // ГЛОБАЛЬНЫЙ СЛУШАТЕЛЬ ДЛЯ НОВЫХ ПРИВАТНЫХ СООБЩЕНИЙ
    let globalPrivateListener = null;
    function startGlobalPrivateListener() {
        if (globalPrivateListener) return;
        
        console.log("🔔 СЛУШАТЕЛЬ ЗАПУЩЕН");
        
        const privateMessagesRef = ref(db, "private_messages");
        
        globalPrivateListener = onChildAdded(privateMessagesRef, (snapshot) => {
            const data = snapshot.val();
            const msgId = snapshot.key;
            
            console.log("📨 ПОЛУЧЕНО СООБЩЕНИЕ:", data);
            
            if (!data || !data.text) return;
            
            // Проверяем, это сообщение для текущего пользователя?
            if (data.toId === userId && data.fromId !== userId) {
                const senderId = data.fromId;
                const senderName = data.username;
                
                console.log(`✅ СООБЩЕНИЕ ДЛЯ ВАС от: ${senderName}`);
                
                // Добавляем в кэш
                if (!privateMessages.has(senderId)) {
                    privateMessages.set(senderId, []);
                    privateMessageIds.set(senderId, new Set());
                }
                
                const msgs = privateMessages.get(senderId);
                const msgIdsSet = privateMessageIds.get(senderId);
                
                if (!msgIdsSet.has(msgId)) {
                    msgIdsSet.add(msgId);
                    msgs.push({
                        id: msgId,
                        username: data.username,
                        text: data.text,
                        timestamp: data.timestamp,
                        fromId: data.fromId,
                        toId: data.toId
                    });
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    privateMessages.set(senderId, msgs);
                }
                
                // Проверяем, открыта ли вкладка
                const isTabOpen = openTabs.some(tab => tab.type === "private" && tab.id === senderId);
                const isActive = (currentChat.type === "private" && currentChat.id === senderId);
                
                console.log(`📊 isTabOpen=${isTabOpen}, isActive=${isActive}`);
                console.log(`📊 Текущие вкладки:`, openTabs.map(t => t.name));
                
                if (!isTabOpen) {
                    // СОЗДАЕМ НОВУЮ ВКЛАДКУ
                    console.log(`➕ СОЗДАЮ НОВУЮ ВКЛАДКУ: ${senderName}`);
                    openTabs.push({ type: "private", id: senderId, name: senderName });
                    saveTabs();
                    
                    // Увеличиваем счетчик
                    const current = unreadCounts.get(senderId) || 0;
                    unreadCounts.set(senderId, current + 1);
                    saveUnread();
                    
                    // ОБНОВЛЯЕМ ВКЛАДКИ
                    renderTabs();
                    
                    // ПОКАЗЫВАЕМ УВЕДОМЛЕНИЕ
                    showToast(`💬 Новое сообщение от ${senderName}`);
                    
                    // СИСТЕМНОЕ СООБЩЕНИЕ В ОБЩИЙ ЧАТ
                    const sysMsg = document.createElement("div");
                    sysMsg.className = "system-message";
                    sysMsg.style.background = "#2a5a2a";
                    sysMsg.style.color = "#ffaa33";
                    sysMsg.style.border = "2px solid #ffaa33";
                    sysMsg.style.padding = "0.8rem";
                    sysMsg.innerHTML = `✨ НОВОЕ ЛИЧНОЕ СООБЩЕНИЕ от ${escapeHtml(senderName)}! ✨<br>Нажмите на вкладку "${escapeHtml(senderName)}" чтобы прочитать.`;
                    messagesArea.appendChild(sysMsg);
                    scrollToBottom();
                    setTimeout(() => sysMsg.remove(), 10000);
                    
                    alert(`📩 Новое сообщение от ${senderName}!`);
                    
                } else if (!isActive) {
                    // Вкладка есть, но не активна - увеличиваем счетчик
                    console.log(`🔔 УВЕЛИЧИВАЮ СЧЕТЧИК для ${senderName}`);
                    const current = unreadCounts.get(senderId) || 0;
                    unreadCounts.set(senderId, current + 1);
                    saveUnread();
                    renderTabs();
                    showToast(`💬 Новое сообщение от ${senderName}`);
                    alert(`📩 Новое сообщение от ${senderName}!`);
                }
                
                // Если чат активен, обновляем
                if (isActive) {
                    console.log(`🔄 ОБНОВЛЯЮ UI для ${senderName}`);
                    messagesArea.innerHTML = '';
                    msgs.forEach(msg => {
                        addMessageToDOM(msg.username, msg.text, msg.timestamp, msg.fromId === userId);
                    });
                    scrollToBottom();
                }
            }
        });
        
        console.log("✅ СЛУШАТЕЛЬ ЗАПУЩЕН, жду сообщения...");
    }
    
    // SEND MESSAGE
    let lastSend = 0;
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (Date.now() - lastSend < 500) {
            showToast("◼ Подождите");
            return;
        }
        lastSend = Date.now();
        
        if (currentChat.type === "global") {
            push(ref(db, "global_messages"), {
                username: username,
                text: text,
                timestamp: Date.now(),
                userId: userId
            });
        } else {
            const chatId = [userId, currentChat.id].sort().join('_');
            push(ref(db, `private_messages/${chatId}`), {
                username: username,
                text: text,
                timestamp: Date.now(),
                fromId: userId,
                toId: currentChat.id
            });
        }
        messageInput.value = "";
        messageInput.focus();
    }
    
    // USER STATUS
    function updateStatus() {
        set(ref(db, `users/${userId}`), {
            username: username,
            lastSeen: Date.now(),
            online: true
        });
    }
    
    // USERS LIST
    onValue(ref(db, "users"), (snapshot) => {
        const data = snapshot.val();
        users.clear();
        if (data) {
            const now = Date.now();
            for (let id in data) {
                if (id !== userId) {
                    const online = (now - (data[id].lastSeen || 0) < 120000);
                    users.set(id, { name: data[id].username, online });
                }
            }
        }
        const term = searchInput.value.toLowerCase();
        const list = Array.from(users.entries())
            .filter(([id, u]) => u.name.toLowerCase().includes(term))
            .sort((a, b) => (b[1].online ? 1 : 0) - (a[1].online ? 1 : 0));
        
        if (list.length === 0) {
            usersListDiv.innerHTML = '<div class="system-message">◼ Нет пользователей</div>';
            return;
        }
        usersListDiv.innerHTML = list.map(([id, u]) => `
            <div class="user-item" data-id="${id}" data-name="${u.name}">
                <div class="user-info">
                    <span class="user-avatar">🦊</span>
                    <span class="user-name">${escapeHtml(u.name)}</span>
                </div>
                <div class="user-status ${u.online ? 'status-online' : 'status-offline'}"></div>
            </div>
        `).join('');
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => openPrivateChat(el.dataset.id, el.dataset.name));
        });
    });
    
    searchInput.addEventListener("input", () => {
        const ev = new Event('value');
        document.dispatchEvent(ev);
    });
    
    // INIT
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(window.location.href);
        showToast("◼ Ссылка скопирована");
    });
    
    loadTabs();
    loadUnread();
    startGlobalListener();
    startGlobalPrivateListener();
    updateStatus();
    setInterval(updateStatus, 30000);
    
    window.addEventListener("beforeunload", () => {
        set(ref(db, `users/${userId}`), { username, lastSeen: Date.now(), online: false });
    });
    
    setTimeout(() => {
        if (username.startsWith("Гость_")) {
            const newName = prompt("Введите ваше имя:", username);
            if (newName && newName.trim()) {
                username = newName.trim().slice(0, 24);
                localStorage.setItem("fembo_name", username);
                updateStatus();
            }
        }
    }, 500);
    
    renderTabs();
    
    setTimeout(() => {
        openTabs.forEach(tab => {
            if (tab.type === "private") {
                startPrivateListener(tab.id);
            }
        });
    }, 1000);
    
    console.log("🚀 ЧАТ ЗАПУЩЕН!");
    console.log("👤 Ваш ID:", userId);
    console.log("📝 Ваше имя:", username);
    console.log("💡 Откройте другую вкладку браузера и отправьте сообщение этому пользователю");
</script>
</body>
</html>
